<style>
body{margin:0;font-family:-apple-system;background:#0f0f0f;color:white}

/* HEADER */
header{text-align:center;padding:15px;font-size:22px;font-weight:bold}

/* LOGO */
.logo{text-align:center}
.logo img{
width:120px;
border-radius:50%;
box-shadow:0 0 25px #0a84ff
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

/* MENU */
.menu-title{
font-size:18px;
font-weight:bold;
cursor:pointer;
}

/* ẨN/HIỆN */
.menu-content{
display:none;
margin-top:10px;
}

/* APP ITEM */
.app-item{
display:flex;
align-items:center;
gap:12px;
background:#2c2c2e;
padding:12px;
border-radius:15px;
margin:10px 0;
transition:0.2s;
}

/* 🔥 GLOW LOGO GAME */
.app-item img{
width:55px;
height:55px;
border-radius:15px;
flex-shrink:0;
animation:glowGame 2s infinite alternate;
}

@keyframes glowGame{
0%{box-shadow:0 0 8px #0a84ff;}
50%{box-shadow:0 0 25px #0a84ff,0 0 40px rgba(10,132,255,0.6);}
100%{box-shadow:0 0 10px #0a84ff;}
}

/* HOVER */
.app-item:hover{
transform:scale(1.03);
box-shadow:0 0 15px rgba(10,132,255,0.4);
}

.app-info{
flex:1;
display:flex;
flex-direction:column;
gap:8px;
}

.app-title{
font-size:16px;
font-weight:500;
}

/* BUTTON */
.btn{
display:inline-flex;
align-items:center;
justify-content:center;
gap:6px;
padding:8px 12px;
border-radius:10px;
background:#0a84ff;
color:white;
cursor:pointer;
width:140px;
}

.btn:active{
transform:scale(0.95);
}

/* COLORS */
.green{background:#34c759;box-shadow:0 0 15px #34c759;}
.blue{background:#0a84ff;box-shadow:0 0 15px #0a84ff;}

/* VIDEO */
.video{display:none;margin-top:10px;text-align:center}
.video iframe{
width:100%;
max-width:320px;
height:550px;
border-radius:15px;
}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#0a84ff;
padding:10px 20px;
border-radius:10px;
display:none;
}
</style>

<script>
function toggleMenu(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block"?"none":"block";
}

function copyLink(link){
navigator.clipboard.writeText(link);
showToast("✅ Đã sao chép!");
}

function showToast(text){
let t=document.getElementById("toast");
t.innerText=text;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* VIDEO */
function showVideo(id){
document.getElementById(id).style.display="block";
}

/* PASS VIDEO */
function checkPass(){
let pass=prompt("🔒 Nhập mật khẩu:");
if(pass==="1402"){
showVideo("v3");
}else{
alert("❌ Sai mật khẩu!");
}
}
</script>
