<html lang="vi">
<head>
<meta charset="UTF-8">

<title>SPEED I AM NHT</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white
}

/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
padding:15px;
font-size:20px;
font-weight:700;
}

/* TICK */
.tick{
width:18px;height:18px;position:relative;
display:flex;align-items:center;justify-content:center;
}
.tick::before{
content:"";
position:absolute;
width:100%;height:100%;
background:#0a84ff;
clip-path:polygon(50% 0%,65% 15%,85% 15%,90% 35%,100% 50%,90% 65%,85% 85%,65% 85%,50% 100%,35% 85%,15% 85%,10% 65%,0% 50%,10% 35%,15% 15%,35% 15%);
box-shadow:0 0 10px #0a84ff;
animation:spin 3s linear infinite;
}
.tick::after{content:"✔";font-size:10px;z-index:1;}
@keyframes spin{100%{transform:rotate(360deg);}}

/* LOGO */
.logo{text-align:center}
.logo img{
width:120px;border-radius:50%;
box-shadow:0 0 25px #0a84ff
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

/* MENU */
.menu-title{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
font-weight:700;
}
.arrow{transition:0.3s;}
.arrow.rotate{transform:rotate(180deg);}

.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.4s ease;
}
.menu-content.open{
max-height:1200px;
opacity:1;
margin-top:10px;
}

/* DOT */
.menu-dot{
width:10px;height:10px;
background:#0a84ff;
border-radius:50%;
box-shadow:0 0 10px #0a84ff;
animation:blink 1s infinite;
}
@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

/* SPEED */
.app-item{
display:flex;
flex-direction:column;
align-items:center;
background:#2c2c2e;
padding:15px;
border-radius:18px;
margin:12px 0;
}
.app-item img{
width:60px;border-radius:15px;
margin-bottom:10px;
box-shadow:0 0 15px #0a84ff;
}
.copy-btn{
background:#0a84ff;
box-shadow:0 0 15px #0a84ff;
padding:12px;
border-radius:12px;
width:80%;
text-align:center;
cursor:pointer;
position:relative;
overflow:hidden;
}
.copy-btn::after{
content:"";
position:absolute;
width:10px;height:10px;
background:rgba(255,255,255,0.5);
border-radius:50%;
transform:scale(0);
}
.copy-btn.ripple::after{
animation:ripple 0.6s;
}
@keyframes ripple{
0%{transform:scale(0);opacity:1;}
100%{transform:scale(20);opacity:0;}
}

/* ESIGN */
.esign-logo{
width:90px;border-radius:20px;
margin:15px auto;
display:block;
box-shadow:0 0 25px #0a84ff;
}
.esign-btn,.cert-btn{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
background:#0a84ff;
padding:14px;
border-radius:14px;
margin-top:12px;
font-weight:700;
box-shadow:0 0 15px #0a84ff;
cursor:pointer;
}
.active-dot{
width:10px;height:10px;
background:#00ffcc;
border-radius:50%;
box-shadow:0 0 10px #00ffcc;
animation:blink 1s infinite;
}

/* VIDEO */
.video-btn{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
border-radius:14px;
margin-top:10px;
background:#2c2c2e;
cursor:pointer;
}
.video-btn.active{
background:#0a84ff;
box-shadow:0 0 15px #0a84ff;
}
.video-left{
display:flex;
align-items:center;
gap:10px;
}
.video-controls{
display:flex;
gap:10px;
}

.video{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.4s;
text-align:center;
}
.video.open{
max-height:600px;
opacity:1;
margin-top:10px;
}
.video iframe{
width:100%;
max-width:320px;
height:550px;
border-radius:15px;
border:none;
}

/* TOAST */
#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:12px 20px;
border-radius:14px;
opacity:0;
transition:0.3s;
}
#toast.show{opacity:1;}
</style>

<script>
let currentVideo=null;
let players={};
let muteState={};

/* YOUTUBE API */
let tag=document.createElement('script');
tag.src="https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

function onYouTubeIframeAPIReady(){
["v1","v2"].forEach(id=>{
players[id]=new YT.Player(id+"-frame");
muteState[id]=true;
});
}

/* MENU */
function toggleMenu(id,arrow){
let el=document.getElementById(id);
el.classList.toggle("open");
arrow.classList.toggle("rotate");
}

/* COPY */
function copyLink(link,btn){
navigator.clipboard.writeText(link);
btn.classList.add("ripple");
setTimeout(()=>btn.classList.remove("ripple"),600);

let t=document.getElementById("toast");
t.innerHTML="✔ Đã sao chép link";
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

/* VIDEO */
function toggleVideo(id,btn){

if(currentVideo===id){
players[id].pauseVideo();
document.getElementById(id).classList.remove("open");
btn.classList.remove("active");
btn.querySelector(".play").innerHTML="▶";
currentVideo=null;
return;
}

for(let v in players){
players[v].pauseVideo();
document.getElementById(v).classList.remove("open");

let b=document.querySelector(`[data-id="${v}"]`);
if(b){
b.classList.remove("active");
b.querySelector(".play").innerHTML="▶";
}
}

document.getElementById(id).classList.add("open");
players[id].playVideo();

btn.classList.add("active");
btn.querySelector(".play").innerHTML="⏸";

currentVideo=id;
}

/* SOUND */
function toggleSound(id,icon){
if(muteState[id]){
players[id].unMute();
icon.innerHTML="🔊";
}else{
players[id].mute();
icon.innerHTML="🔇";
}
muteState[id]=!muteState[id];
}
</script>

</head>
