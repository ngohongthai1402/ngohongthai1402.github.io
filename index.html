<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED I AM NHT</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white
}

/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
gap:3px;
padding:15px;
font-size:20px;
font-weight:700;
}

/* TICK XOAY */
.tick{
width:18px;height:18px;position:relative;
}
.tick::before{
content:"";
position:absolute;
width:100%;height:100%;
background:#0a84ff;
border-radius:50%;
box-shadow:0 0 10px #0a84ff;
animation:spin 3s linear infinite;
}
.tick::after{
content:"✔";
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:10px;
}
@keyframes spin{100%{transform:rotate(360deg)}}

/* LOGO */
.logo{text-align:center}
.logo img{
width:120px;border-radius:50%;
box-shadow:0 0 25px #0a84ff
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

/* MENU */
.menu-title{
font-size:18px;
font-weight:700;
display:flex;
justify-content:space-between;
cursor:pointer;
}
.menu-content{display:none;margin-top:10px}

/* DOT MENU */
.menu-dot{
width:10px;height:10px;
background:#00ffcc;
border-radius:50%;
margin-left:6px;
animation:blink 1s infinite;
}

/* APP */
.app-item{
display:flex;
flex-direction:column;
align-items:center;
background:#2c2c2e;
padding:15px;
border-radius:18px;
margin:12px 0;
}
.app-item img{
width:60px;border-radius:15px;
margin-bottom:10px;
box-shadow:0 0 20px #0a84ff;
}
.app-title{font-weight:700;margin-bottom:10px}

/* COPY BUTTON */
.copy-btn{
background:#0a84ff;
padding:12px;
border-radius:12px;
width:80%;
text-align:center;
box-shadow:0 0 15px #0a84ff;
cursor:pointer;
position:relative;
overflow:hidden;
}
.copy-btn:active{
transform:scale(0.92);
}

/* RIPPLE */
.copy-btn::after{
content:"";
position:absolute;
width:10px;height:10px;
background:rgba(255,255,255,0.5);
border-radius:50%;
transform:scale(0);
opacity:0;
}
.copy-btn.ripple::after{
animation:rippleEffect 0.6s ease;
}
@keyframes rippleEffect{
0%{transform:scale(0);opacity:0.8;}
100%{transform:scale(20);opacity:0;}
}

/* ESIGN */
.esign-logo{
width:80px;border-radius:15px;
box-shadow:0 0 20px #0a84ff;
margin-bottom:10px;
}
.esign-btn,.cert-btn{
background:#0a84ff;
padding:14px;
border-radius:14px;
margin-top:10px;
font-weight:700;
cursor:pointer;
}

/* DOT */
.dot{
width:10px;height:10px;
background:#00ffcc;
border-radius:50%;
margin-left:6px;
animation:blink 1s infinite;
}
@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

/* VIDEO */
.video-btn{
background:#2c2c2e;
padding:14px;
border-radius:14px;
margin-top:10px;
font-weight:700;
cursor:pointer;
text-align:center;
}
.video-btn.active{
background:#0a84ff;
box-shadow:0 0 15px #0a84ff;
}
.video{
display:none;
margin-top:10px;
text-align:center;
}
.video iframe{
width:100%;
max-width:320px;
height:550px;
border-radius:15px;
}

/* TOAST XỊN */
#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%) translateY(20px);
background:rgba(20,20,20,0.95);
backdrop-filter:blur(12px);
padding:14px 22px;
border-radius:16px;
font-weight:600;
display:flex;
align-items:center;
gap:10px;
opacity:0;
transition:0.4s;
}
#toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}
.toast-icon{
color:#34c759;
font-size:18px;
animation:pop 0.3s ease;
}
@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1);}
}
</style>

<script>
function toggleMenu(id){
let el=document.getElementById(id);
el.style.display=el.style.display==="block"?"none":"block";
}

function copyLink(link,btn){
navigator.clipboard.writeText(link);

/* ripple */
btn.classList.add("ripple");
setTimeout(()=>btn.classList.remove("ripple"),600);

/* toast */
let t=document.getElementById("toast");
t.innerHTML='<span class="toast-icon">✔</span> Đã sao chép link';
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

function showVideo(id,btn){
let videos=document.querySelectorAll(".video");
let buttons=document.querySelectorAll(".video-btn");

videos.forEach(v=>v.style.display="none");
buttons.forEach(b=>b.classList.remove("active"));

document.getElementById(id).style.display="block";
btn.classList.add("active");
}
</script>

</head>

<body>

<header>
Ngô Hồng Thái <span class="tick"></span>
</header>

<div class="logo">
<img src="logo.png">
</div>

<!-- SPEED -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu1')">
DANH SÁCH SPEED ▼
</div>

<div id="menu1" class="menu-content">

<div class="app-item">
<img src="logogame.png">
<div class="app-title">ĐẾM VÒNG V1</div>
<div class="copy-btn" onclick="copyLink('link1',this)">SAO CHÉP</div>
</div>

<div class="app-item">
<img src="logogame.png">
<div class="app-title">ĐẾM VÒNG V2</div>
<div class="copy-btn" onclick="copyLink('link2',this)">SAO CHÉP</div>
</div>

<div class="app-item">
<img src="logogame.png">
<div class="app-title">SPEED IGG</div>
<div class="copy-btn" onclick="copyLink('link3',this)">SAO CHÉP</div>
</div>

</div>
</div>

<!-- ESIGN -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu2')">
<span style="display:flex;align-items:center;">
ESIGN AXITAT <span class="menu-dot"></span>
</span>
<span>▼</span>
</div>

<div id="menu2" class="menu-content" style="text-align:center;">

<img src="esign.png" class="esign-logo">

<div class="esign-btn"
onclick="window.location.href='itms-services://?action=download-manifest&url=https://ngohongthai1402.github.io/esign.plist'">
CÀI ĐẶT APP ESIGN <span class="dot"></span>
</div>

<div class="cert-btn"
onclick="window.location.href='https://github.com/ngohongthai1402/ngohongthai1402.github.io/raw/main/CertificateAxitat.zip'">
📥 TẢI CHỨNG CHỈ AXITAT
</div>

</div>
</div>

<!-- VIDEO -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu3')">
XEM VIDEO HƯỚNG DẪN ▼
</div>

<div id="menu3" class="menu-content">

<div class="video-btn" onclick="showVideo('v1',this)">
HƯỚNG DẪN TẢI ESIGN + SPEED
</div>
<div id="v1" class="video">
<iframe src="https://www.youtube.com/embed/8ynQoiww9d4"></iframe>
</div>

<div class="video-btn" onclick="showVideo('v2',this)">
HƯỚNG DẪN CẬP NHẬT COIN MASTER
</div>
<div id="v2" class="video">
<iframe src="https://www.youtube.com/embed/e74h1eb3b0c"></iframe>
</div>

</div>
</div>

<div id="toast"></div>

</body>
</html>
