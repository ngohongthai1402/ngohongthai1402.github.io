<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED I AM NHT</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:-apple-system;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

/* DARK LIGHT */
:root{
--bg:#0f0f0f;
--text:#fff;
--box:#1c1c1e;
}
.light{
--bg:#f2f2f7;
--text:#000;
--box:#fff;
}

/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
padding:15px;
font-size:20px;
font-weight:700;
}

/* BUTTON DARK */
#themeBtn{
position:fixed;
top:20px;
right:20px;
background:#0a84ff;
padding:12px;
border-radius:14px;
cursor:pointer;
box-shadow:0 0 15px #0a84ff;
z-index:999;
}

/* BOX */
.box{
margin:15px;
background:var(--box);
border-radius:20px;
padding:15px;
}

/* MENU */
.menu-title{
display:flex;
justify-content:space-between;
cursor:pointer;
font-weight:700;
}
.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.4s;
}
.menu-content.open{
max-height:1200px;
opacity:1;
margin-top:10px;
}

/* BUTTON */
.copy-btn{
background:#0a84ff;
padding:14px;
border-radius:14px;
text-align:center;
cursor:pointer;
margin-top:10px;
}

/* IOS MENU FIX */
#iosMenu{
position:fixed;
bottom:-100%;
left:0;
width:100%;
background:#1c1c1e;
border-radius:25px 25px 0 0;
padding:15px;
transition:0.4s;
z-index:9999;
}
#iosMenu.show{bottom:0;}

#overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.4);
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:9998;
}
#overlay.show{
opacity:1;
pointer-events:auto;
}

#openMenuBtn{
position:fixed;
bottom:20px;
right:20px;
background:#0a84ff;
width:55px;height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:#fff;
z-index:9999;
}

.menu-item{
padding:15px;
background:#2c2c2e;
margin:8px 0;
border-radius:14px;
text-align:center;
}

/* ONLINE */
#onlineBox{
text-align:center;
font-size:14px;
opacity:0.9;
}

/* TOAST */
#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:12px 20px;
border-radius:14px;
opacity:0;
}
#toast.show{opacity:1;}
</style>
</head>

<body>

<div id="themeBtn" onclick="toggleTheme()">🌙</div>

<header>Ngô Hồng Thái</header>

<!-- ONLINE -->
<div class="box" id="onlineBox">
👤 Online: <span id="online">0</span> |
📥 DNS: <span id="download">0</span>
</div>

<!-- SPEED -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu1')">SPEED ▼</div>
<div id="menu1" class="menu-content">

<div class="copy-btn" onclick="copyLink('link1')">ĐẾM VÒNG V1</div>
<div class="copy-btn" onclick="copyLink('link2')">ĐẾM VÒNG V2</div>

</div>
</div>

<!-- DNS -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menuDNS')">DNS ▼</div>
<div id="menuDNS" class="menu-content">
<div class="copy-btn" onclick="downloadDNS()">TẢI DNS</div>
</div>
</div>

<!-- ESIGN -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu2')">ESIGN AXITAT ▼</div>
<div id="menu2" class="menu-content">
<div class="copy-btn" onclick="window.location.href='itms-services://?action=download-manifest&url=https://ngohongthai1402.github.io/esign.plist'">CÀI ESIGN</div>
<div class="copy-btn" onclick="window.location.href='https://github.com/ngohongthai1402/ngohongthai1402.github.io/raw/refs/heads/main/CertificateAxitat.zip'">TẢI CHỨNG CHỈ</div>
</div>
</div>

<!-- IOS MENU -->
<div id="openMenuBtn" onclick="openMenu()">☰</div>
<div id="overlay" onclick="closeMenu()"></div>

<div id="iosMenu">
<div class="menu-item" onclick="window.open('https://zsign.s3.vn-hcm-1.vietnix.cloud/ipa/coinmaster.ipa')">🎮 Coin Master</div>
<div class="menu-item" onclick="window.open('https://udid.io')">🆔 UDID</div>
<div class="menu-item" onclick="window.open('https://sign.ipasign.cc')">📦 Ký IPA</div>
<div class="menu-item" onclick="window.open('https://ipalibrary.me')">📚 Kho IPA</div>
</div>

<div id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDcmYnUovHHHBWFATXuLG3o4oGcnLKhwnQ",
authDomain: "iamnht.firebaseapp.com",
databaseURL: "https://iamnht-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "iamnht",
storageBucket: "iamnht.firebasestorage.app",
messagingSenderId: "359554660567",
appId: "1:359554660567:web:84c9b72e079067e6ef1892"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ONLINE */
let userRef = ref(db, 'online/' + Date.now());
set(userRef, true);

onValue(ref(db, 'online'), snap=>{
document.getElementById("online").innerText = snap.size || 0;
});

/* DOWNLOAD */
function downloadDNS(){
let dRef = ref(db,'download');
onValue(dRef,snap=>{
let val=snap.val()||0;
set(dRef,val+1);
});
window.location.href='https://raw.githubusercontent.com/ngohongthai1402/dns/ngohongthai/dns.mobileconfig';
}

/* UI */
window.toggleMenu = id=>{
document.getElementById(id).classList.toggle("open");
}

window.copyLink = (l)=>{
navigator.clipboard.writeText(l);
showToast("Đã copy");
}

window.openMenu=()=>{
iosMenu.classList.add("show");
overlay.classList.add("show");
}

window.closeMenu=()=>{
iosMenu.classList.remove("show");
overlay.classList.remove("show");
}

window.toggleTheme=()=>{
document.body.classList.toggle("light");
}

function showToast(t){
let toast=document.getElementById("toast");
toast.innerHTML=t;
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),2000);
}
</script>

</body>
</html>
