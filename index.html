<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white;
transition:0.3s;
}

/* LIGHT MODE */
body.light{
background:#f2f2f7;
color:#000;
}
body.light .box{background:#fff;}
body.light .app{background:#e5e5ea;}
body.light .navbar{background:#fff;}
body.light .btn{background:#000;color:#fff}

/* NAV */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#1c1c1e;
}

.counter{
font-size:13px;
}

.toggle{
cursor:pointer;
font-size:18px;
}

/* HEADER */
header{text-align:center;font-size:20px;margin-top:10px;font-weight:700;}

/* LOGO */
.logo img{
width:120px;
height:120px;
border-radius:50%;
display:block;
margin:10px auto;
object-fit:cover;
object-position:center top;
box-shadow:0 0 25px #0a84ff;
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

.menu-title{
display:flex;
justify-content:space-between;
cursor:pointer;
font-weight:700;
}

.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.3s;
}
.menu-content.open{
max-height:2000px;
opacity:1;
margin-top:10px;
}

/* APP */
.app{
background:#2c2c2e;
padding:12px;
border-radius:14px;
margin-top:10px;
text-align:center;
}

.btn{
background:#0a84ff;
padding:10px;
border-radius:10px;
margin-top:8px;
cursor:pointer;
}

/* VIDEO */
iframe{
width:100%;
height:200px;
border-radius:12px;
margin-top:10px;
}

/* FOOTER */
.footer{
text-align:center;
margin:20px;
font-size:13px;
}
</style>
</head>

<body>

<script>
function toggleMenu(id){
document.getElementById(id).classList.toggle("open");
}

/* DARK LIGHT */
function toggleTheme(){
document.body.classList.toggle("light");
let icon=document.getElementById("themeIcon");
icon.innerText=document.body.classList.contains("light")?"☀️":"🌙";
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDcmYnUovHHHBWFATXuLG3o4oGcnLKhwnQ",
authDomain: "iamnht.firebaseapp.com",
databaseURL: "https://iamnht-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "iamnht",
storageBucket: "iamnht.firebasestorage.app",
messagingSenderId: "359554660567",
appId: "1:359554660567:web:84c9b72e079067e6ef1892"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ONLINE */
const userRef = ref(db, "online/" + Date.now());
set(userRef, true);
onDisconnect(userRef).remove();

onValue(ref(db, "online"), snap=>{
document.getElementById("online").innerText = snap.size || 0;
});

/* DNS */
onValue(ref(db, "dns"), snap=>{
document.getElementById("dns").innerText = snap.val() || 0;
});
</script>
