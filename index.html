<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED I AM NHT</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white
}

/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
padding:15px;
font-size:20px;
font-weight:700;
}

/* LOGO FIX TRÀN */
.logo{text-align:center;overflow:hidden}
.logo img{
width:120px;
max-width:90%;
border-radius:50%;
box-shadow:0 0 25px #0a84ff;
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

/* MENU */
.menu-title{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
font-weight:700;
}
.arrow{transition:0.3s;}
.arrow.rotate{transform:rotate(180deg);}

.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.4s;
}
.menu-content.open{
max-height:1200px;
opacity:1;
margin-top:10px;
}

/* BUTTON */
.copy-btn{
background:#0a84ff;
box-shadow:0 0 15px #0a84ff;
padding:14px;
border-radius:14px;
text-align:center;
cursor:pointer;
margin-top:10px;
}

/* STATS */
.stats{
text-align:center;
margin-top:15px;
font-size:14px;
opacity:0.9;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
font-size:13px;
opacity:0.6;
}
</style>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, onDisconnect, push, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDcmYnUovHHHBWFATXuLG3o4oGcnLKhwnQ",
  authDomain: "iamnht.firebaseapp.com",
  databaseURL: "https://iamnht-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "iamnht",
  storageBucket: "iamnht.firebasestorage.app",
  messagingSenderId: "359554660567",
  appId: "1:359554660567:web:84c9b72e079067e6ef1892"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* =========================
   👤 ĐẾM ONLINE REALTIME
========================= */
const userRef = push(ref(db, "online"));
set(userRef, true);
onDisconnect(userRef).remove();

onValue(ref(db, "online"), (snap)=>{
  document.getElementById("online").innerText = snap.size || 0;
});

/* =========================
   📥 ĐẾM DOWNLOAD DNS
========================= */
window.downloadDNS = function(){
  runTransaction(ref(db, "dns_download"), (current)=>{
    return (current || 0) + 1;
  });

  window.location.href='https://raw.githubusercontent.com/ngohongthai1402/dns/ngohongthai/dns.mobileconfig';
};

onValue(ref(db, "dns_download"), (snap)=>{
  document.getElementById("dnsCount").innerText = snap.val() || 0;
});
</script>

<script>
function toggleMenu(id,arrow){
let el=document.getElementById(id);
el.classList.toggle("open");
arrow.classList.toggle("rotate");
}
</script>

</head>

<body>

<header>
Ngô Hồng Thái
</header>

<div class="logo">
<img src="logo.png">
</div>

<!-- MENU SPEED -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('m1',this.querySelector('.arrow'))">
<span>DANH SÁCH SPEED</span>
<span class="arrow">▼</span>
</div>

<div id="m1" class="menu-content">

<div class="copy-btn">ĐẾM VÒNG V1</div>
<div class="copy-btn">ĐẾM VÒNG V2</div>
<div class="copy-btn">SPEED IGG</div>

</div>
</div>

<!-- DNS -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('dns',this.querySelector('.arrow'))">
<span>DNS CHẶN THU HỒI</span>
<span class="arrow">▼</span>
</div>

<div id="dns" class="menu-content">

<div class="copy-btn" onclick="downloadDNS()">
📥 TẢI NHT DNS
</div>

<div class="stats">
👤 Online: <b id="online">0</b><br>
📥 Đã tải DNS: <b id="dnsCount">0</b>
</div>

</div>
</div>

<!-- FOOTER -->
<footer>
Ngô Hồng Thái đang tập làm web lỏ 😅
</footer>

</body>
</html>
