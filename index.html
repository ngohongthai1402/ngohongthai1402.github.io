<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED I AM NHT</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system;background:#0f0f0f;color:white}

/* HEADER */
header{
display:flex;justify-content:center;align-items:center;gap:6px;
padding:15px;font-size:20px;font-weight:700;
}

/* ONLINE BOX */
.status-bar{
display:flex;
justify-content:center;
gap:15px;
font-size:13px;
margin-top:-10px;
margin-bottom:10px;
opacity:0.9;
}
.status-box{
background:#1c1c1e;
padding:8px 12px;
border-radius:12px;
box-shadow:0 0 10px #0a84ff33;
}

/* LOGO FIX */
.logo{text-align:center;overflow:hidden;}
.logo img{
width:120px;
max-width:100%;
border-radius:50%;
box-shadow:0 0 25px #0a84ff;
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
overflow:hidden;
}

/* MENU */
.menu-title{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
font-weight:700;
}
.arrow{transition:0.3s;}
.arrow.rotate{transform:rotate(180deg);}

.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.4s ease;
}
.menu-content.open{
max-height:1500px;
opacity:1;
margin-top:10px;
}

/* APP */
.app-item{
display:flex;
flex-direction:column;
align-items:center;
background:#2c2c2e;
padding:15px;
border-radius:18px;
margin:12px 0;
}
.app-item img{
width:60px;
border-radius:15px;
margin-bottom:10px;
}

/* BUTTON */
.copy-btn{
background:#0a84ff;
padding:14px;
border-radius:14px;
width:100%;
text-align:center;
cursor:pointer;
margin-top:10px;
}

/* ESIGN */
.esign-btn,.cert-btn{
display:flex;
justify-content:center;
align-items:center;
background:#0a84ff;
padding:14px;
border-radius:14px;
margin-top:12px;
cursor:pointer;
}

/* IOS 17 MENU */
.ios-menu{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:10px;
}
.ios-item{
background:#2c2c2e;
padding:12px;
border-radius:18px;
text-align:center;
font-size:12px;
cursor:pointer;
}
.ios-item:hover{
background:#0a84ff;
}

/* TOAST */
#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:12px 20px;
border-radius:14px;
opacity:0;
transition:0.3s;
}
#toast.show{opacity:1;}
</style>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDcmYnUovHHHBWFATXuLG3o4oGcnLKhwnQ",
  databaseURL: "https://iamnht-default-rtdb.asia-southeast1.firebasedatabase.app",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ONLINE
let userRef = db.ref("online").push();
userRef.set(true);
userRef.onDisconnect().remove();

db.ref("online").on("value", snap=>{
document.getElementById("online").innerText = snap.numChildren();
});

// DOWNLOAD DNS
function downloadDNS(btn){
db.ref("dns_download").transaction(x => (x||0)+1);

window.location.href='https://raw.githubusercontent.com/ngohongthai1402/dns/ngohongthai/dns.mobileconfig';

let t=document.getElementById("toast");
t.innerHTML="📥 Đang tải DNS...";
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

// COUNT DNS
db.ref("dns_download").on("value", snap=>{
document.getElementById("dns").innerText = snap.val() || 0;
});

// MENU
function toggleMenu(id,arrow){
let el=document.getElementById(id);
el.classList.toggle("open");
arrow.classList.toggle("rotate");
}

// COPY
function copyLink(link){
navigator.clipboard.writeText(link);
let t=document.getElementById("toast");
t.innerHTML="✔ Đã sao chép";
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}
</script>
</head>

<body>

<header>Ngô Hồng Thái</header>

<div class="status-bar">
<div class="status-box">👥 Online: <span id="online">0</span></div>
<div class="status-box">📥 DNS: <span id="dns">0</span></div>
</div>

<div class="logo">
<img src="logo.png">
</div>

<!-- IOS MENU -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('ios',this.querySelector('.arrow'))">
<span>MENU IOS 17</span>
<span class="arrow">▼</span>
</div>

<div id="ios" class="menu-content">
<div class="ios-menu">
