<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kho IPA NHT</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#0f0f0f;
  color:white;
}

header {
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.search {
  padding:10px;
}

.search input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1c1c1e;
  color:white;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.app {
  background:#1c1c1e;
  border-radius:20px;
  padding:15px;
  text-align:center;
  transition:0.2s;
}

.app:hover {
  transform:scale(1.05);
}

.app img {
  width:70px;
  border-radius:15px;
}

.btn {
  display:inline-block;
  margin-top:10px;
  padding:8px 15px;
  background:#0a84ff;
  border-radius:10px;
  color:white;
  text-decoration:none;
}

footer {
  text-align:center;
  padding:20px;
  font-size:14px;
  opacity:0.7;
}
</style>

<script>
function searchApp() {
  let input = document.getElementById("search").value.toLowerCase();
  let apps = document.getElementsByClassName("app");

  for (let i = 0; i < apps.length; i++) {
    let name = apps[i].innerText.toLowerCase();
    apps[i].style.display = name.includes(input) ? "" : "none";
  }
}
</script>

</head>

<body>

<header>SPEED I AM NHT</header>

<div class="search">
<input id="search" onkeyup="searchApp()" placeholder="🔍 Tìm ứng dụng...">
</div>

<div class="grid">

<div class="app">
<img src="https://via.placeholder.com/100">

</div>

</div>

<div class="app">

<h3>💎 IGG</h3>
<a class="btn" href="igg.html">Cài ngay</a>
</div>

</div>

<footer>

</footer>

</body>
</html>
