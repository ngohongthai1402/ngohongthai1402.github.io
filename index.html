<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I AM NHT</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white;
transition:0.3s;
}

/* LIGHT MODE */
body.light{
background:#f2f2f7;
color:#000;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:#1c1c1e;
}

.lang{
display:flex;
gap:6px;
}
.lang button{
border:none;
background:#2c2c2e;
color:#fff;
padding:6px 10px;
border-radius:8px;
font-size:12px;
}

.counter-top{
font-size:13px;
opacity:0.9;
}

.toggle{
cursor:pointer;
padding:6px 10px;
background:#2c2c2e;
border-radius:8px;
}

/* HEADER */
header{
text-align:center;
padding:10px;
font-size:20px;
font-weight:700;
}

/* AVATAR */
.logo{
text-align:center;
}
.logo img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
transform:scale(1.15);
box-shadow:0 0 25px #0a84ff;
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

/* MENU */
.menu-title{
display:flex;
justify-content:space-between;
cursor:pointer;
font-weight:700;
}
.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.3s;
}
.menu-content.open{
max-height:1000px;
opacity:1;
margin-top:10px;
}

/* BUTTON */
.copy-btn{
background:#0a84ff;
padding:12px;
border-radius:12px;
margin-top:10px;
text-align:center;
cursor:pointer;
}

/* FOOTER */
.footer{
margin:20px;
text-align:center;
}

.counter{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

.badge{
background:#1c1c1e;
padding:10px 14px;
border-radius:12px;
}

/* LIGHT FIX */
body.light .navbar,
body.light .box,
body.light .badge{
background:white;
color:black;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

<div class="lang">
<button onclick="setLang('vi')">VI</button>
<button onclick="setLang('en')">EN</button>
</div>

<div class="counter-top">
👥 <span id="online">0</span> | 📥 <span id="dns">0</span>
</div>

<div class="toggle" onclick="toggleTheme()">🌙</div>

</div>

<!-- HEADER -->
<header>
Ngô Hồng Thái ✔
</header>

<div class="logo">
<img src="logo.png">
</div>

<!-- SPEED -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('m1')">
<span>DANH SÁCH SPEED</span>
<span>▼</span>
</div>
<div id="m1" class="menu-content">
<div class="copy-btn">ĐẾM VÒNG V1</div>
<div class="copy-btn">ĐẾM VÒNG V2</div>
<div class="copy-btn">SPEED IGG</div>
</div>
</div>

<!-- DNS -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('m2')">
<span>DNS CHẶN THU HỒI</span>
<span>▼</span>
</div>
<div id="m2" class="menu-content">
<div class="copy-btn" onclick="downloadDNS()">TẢI NHT DNS</div>
</div>
</div>

<!-- ESIGN -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('m3')">
<span>ESIGN AXITAT</span>
<span style="color:#00ffcc">●</span>
</div>
<div id="m3" class="menu-content">
<div class="copy-btn">CÀI ESIGN</div>
<div class="copy-btn">TẢI CHỨNG CHỈ</div>
</div>
</div>

<!-- FOOTER -->
<div class="footer">
<div class="counter">
<div class="badge">👥 Online: <span id="online2">0</span></div>
<div class="badge">📦 DNS: <span id="dns2">0</span></div>
</div>

Ngô Hồng Thái đang tập làm web lỏ 😆
</div>

<!-- SCRIPT -->
<script>
function toggleMenu(id){
document.getElementById(id).classList.toggle("open");
}

function toggleTheme(){
document.body.classList.toggle("light");
}

function setLang(type){
if(type==="en"){
document.querySelector("header").innerText="Ngo Hong Thai ✔";
}
if(type==="vi"){
document.querySelector("header").innerText="Ngô Hồng Thái ✔";
}
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDcmYnUovHHHBWFATXuLG3o4oGcnLKhwnQ",
authDomain: "iamnht.firebaseapp.com",
databaseURL: "https://iamnht-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "iamnht",
storageBucket: "iamnht.firebasestorage.app",
messagingSenderId: "359554660567",
appId: "1:359554660567:web:84c9b72e079067e6ef1892"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ONLINE REALTIME */
const userRef = ref(db, "online/" + Date.now());
set(userRef, true);
onDisconnect(userRef).remove();

onValue(ref(db, "online"), snap => {
const count = snap.size || 0;
document.getElementById("online").innerText = count;
document.getElementById("online2").innerText = count;
});

/* DNS COUNT */
onValue(ref(db, "dns"), snap => {
const val = snap.val() || 0;
document.getElementById("dns").innerText = val;
document.getElementById("dns2").innerText = val;
});

/* DOWNLOAD DNS */
window.downloadDNS = function(){
const dnsRef = ref(db,"dns");
onValue(dnsRef, snap=>{
let val = snap.val() || 0;
set(dnsRef, val + 1);
},{onlyOnce:true});

window.location.href='https://raw.githubusercontent.com/ngohongthai1402/dns/ngohongthai/dns.mobileconfig';
}
</script>

</body>
</html>
