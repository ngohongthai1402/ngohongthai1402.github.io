/* LOADING */
#loader{
position:fixed;
width:100%;
height:100%;
background:#0f0f0f;
display:flex;
justify-content:center;
align-items:center;
z-index:9999
}
.loader{
width:60px;
height:60px;
border:6px solid #1c1c1e;
border-top:6px solid #0a84ff;
border-radius:50%;
animation:spin 1s linear infinite
}
@keyframes spin{100%{transform:rotate(360deg)}}

/* HEADER */
header{text-align:center;padding:15px;font-size:22px;font-weight:bold}

/* LOGO */
.logo{text-align:center}
.logo img{
width:120px;
border-radius:50%;
box-shadow:0 0 25px #0a84ff
}

/* SEARCH */

.search input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
background:#1c1c1e;
color:white
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px
}

/* CARD */
.app{
background:#1c1c1e;
border-radius:20px;
padding:15px;
text-align:center;
transition:0.3s
}
.app:hover{transform:scale(1.05)}
.app img{width:70px;border-radius:15px}

/* BUTTON */
.btn{
margin:10px;
padding:10px 15px;
background:#0a84ff;
border-radius:12px;
color:white;
cursor:pointer
}

/* ESIGN BOX */
.esign-box{
margin:20px;
padding:20px;
background:#1c1c1e;
border-radius:25px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6)
}

/* BUTTON STYLE */
.btn-green{
background:#34c759;
padding:12px 25px;
border:none;
border-radius:15px;
color:white;
font-size:16px;
box-shadow:0 0 20px #34c759;
cursor:pointer;
transition:0.3s
}
.btn-green:active{
transform:scale(0.95);
box-shadow:0 0 30px #34c759;
}

.btn-orange{
background:#ff9f0a;
padding:12px 25px;
border:none;
border-radius:15px;
color:white;
font-size:16px;
box-shadow:0 0 20px #ff9f0a;
cursor:pointer;
transition:0.3s
}
.btn-orange:active{
transform:scale(0.95);
box-shadow:0 0 30px #ff9f0a;
}

/* FLOAT ICON */
@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

/* VIDEO */
.video{
display:none;
text-align:center;
margin:15px
}
.video iframe{
width:100%;
max-width:320px;
height:550px;
border-radius:20px
}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#0a84ff;
padding:12px 20px;
border-radius:12px;
display:none
}

/* FOOTER */
footer{text-align:center;padding:20px}
.zalo-btn{
display:inline-block;
background:#0a84ff;
padding:12px 20px;
border-radius:12px;
color:white;
text-decoration:none;
box-shadow:0 0 15px #0a84ff;
}
</style>

<script>
function searchApp(){
let input=document.getElementById("search").value.toLowerCase();
let apps=document.getElementsByClassName("app");
for(let i=0;i<apps.length;i++){
let name=apps[i].innerText.toLowerCase();
apps[i].style.display=name.includes(input)?"":"none";
}
}

function copyLink(link){
navigator.clipboard.writeText(link);
showToast("✅ Đã sao chép link!");
}

function showToast(text){
let toast=document.getElementById("toast");
toast.innerText=text;
toast.style.display="block";
setTimeout(()=>{toast.style.display="none"},2000);
}

function toggleSingle(id, btn){
let video=document.getElementById(id);
if(video.style.display==="block"){
video.style.display="none";
btn.innerText=btn.innerText.replace("Ẩn","Hiện");
}else{
video.style.display="block";
btn.innerText=btn.innerText.replace("Hiện","Ẩn");
video.scrollIntoView({behavior:"smooth"});
}
}

function addDownload(id){
let count=localStorage.getItem(id) || 0;
count++;
localStorage.setItem(id, count);
document.getElementById(id).innerText="🔥 Lượt tải: "+count;
}

function loadStats(){
let ids=["app1","app2","app3","esign","cert"];
ids.forEach(id=>{
let count=localStorage.getItem(id)||0;
let el=document.getElementById(id);
if(el) el.innerText="🔥 Lượt tải: "+count;
});
}

window.onload=function(){
document.getElementById("loader").style.display="none";
loadStats();
}
</script>
