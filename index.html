<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I AM NHT</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system;
background:#0b0b0b;
color:white;
transition:0.3s;
}

/* LIGHT MODE */
body.light{
background:#f2f2f7;
color:#000;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

.menu-btn{
font-size:22px;
background:#1c1c1e;
padding:10px 14px;
border-radius:12px;
}

.toggle{
background:#1c1c1e;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
}

/* TITLE */
.title{
text-align:center;
font-size:22px;
font-weight:700;
margin-top:5px;
}

.tick{
margin-left:5px;
color:#0a84ff;
}

/* AVATAR iOS 17 */
.logo{
display:flex;
justify-content:center;
margin-top:15px;
}

.logo img{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
object-position:center 20%;
transform:scale(1.15);

/* glow viền */
box-shadow:
0 0 0 4px rgba(10,132,255,0.4),
0 0 25px #0a84ff,
0 0 60px rgba(10,132,255,0.5);
}

/* BOX MENU */
.box{
margin:15px;
padding:18px;
border-radius:20px;
background:#1c1c1e;
transition:0.3s;
}

body.light .box{
background:white;
}

/* MENU */
.menu-title{
display:flex;
justify-content:space-between;
cursor:pointer;
font-weight:700;
font-size:16px;
}

.menu-content{
max-height:0;
overflow:hidden;
transition:0.4s;
opacity:0;
}

.menu-content.open{
max-height:800px;
opacity:1;
margin-top:10px;
}

/* BUTTON */
.btn{
background:#0a84ff;
padding:14px;
border-radius:14px;
margin-top:10px;
text-align:center;
cursor:pointer;
box-shadow:0 0 15px #0a84ff;
}

/* ESIGN DOT */
.dot{
width:10px;
height:10px;
background:#00ffcc;
border-radius:50%;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

/* FOOTER */
.footer{
margin:20px;
padding:15px;
border-radius:18px;
background:#1c1c1e;
text-align:center;
}

.counter{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

.badge{
background:#2c2c2e;
padding:10px 15px;
border-radius:14px;
}

/* LANG */
.lang{
display:flex;
gap:10px;
}

.lang button{
padding:8px 12px;
border-radius:10px;
border:none;
}

/* LIGHT BTN */
.switch{
cursor:pointer;
}
</style>

<script>
function toggleMenu(id){
let el=document.getElementById(id);
el.classList.toggle("open");
}

/* DARK LIGHT */
function toggleTheme(){
document.body.classList.toggle("light");
}

/* FAKE COUNTER */
let online=4;
let dns=0;

function downloadDNS(){
dns++;
document.getElementById("dns").innerText=dns;
window.location.href='https://raw.githubusercontent.com/ngohongthai1402/dns/ngohongthai/dns.mobileconfig';
}

/* LANGUAGE */
function setLang(type){
if(type==="en"){
document.getElementById("speed").innerText="SPEED LIST";
document.getElementById("dnsText").innerText="DNS DOWNLOAD";
}
if(type==="vi"){
document.getElementById("speed").innerText="DANH SÁCH SPEED";
document.getElementById("dnsText").innerText="DNS CHẶN THU HỒI";
}
}
</script>

</head>

<body>

<header>
<div class="menu-btn">☰</div>

<div class="lang">
<button onclick="setLang('vi')">VI</button>
<button onclick="setLang('en')">EN</button>
</div>

<div class="toggle switch" onclick="toggleTheme()">🌙</div>
</header>

<div class="title">
Ngô Hồng Thái <span class="tick">✔</span>
</div>

<div class="logo">
<img src="logo3.png">
</div>

<!-- SPEED -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('m1')">
<span id="speed">DANH SÁCH SPEED</span>
<span>▼</span>
</div>

<div id="m1" class="menu-content">
<div class="btn">TẢI COIN MASTER</div>
<div class="btn">KÝ IPA</div>
</div>
</div>

<!-- DNS -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('m2')">
<span id="dnsText">DNS CHẶN THU HỒI</span>
<span>▼</span>
</div>

<div id="m2" class="menu-content">
<div class="btn" onclick="downloadDNS()">TẢI NHT DNS</div>
</div>
</div>

<!-- ESIGN -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('m3')">
<span>ESIGN AXITAT 🔥</span>
<div class="dot"></div>
</div>

<div id="m3" class="menu-content">
<div class="btn">CÀI ESIGN</div>
<div class="btn">TẢI CHỨNG CHỈ</div>
</div>
</div>

<!-- FOOTER -->
<div class="footer">
<div class="counter">
<div class="badge">👥 Online: 4</div>
<div class="badge">📦 DNS: <span id="dns">0</span></div>
</div>

<div>Ngô Hồng Thái đang tập làm web lỏ 😆</div>
</div>

</body>
</html>
