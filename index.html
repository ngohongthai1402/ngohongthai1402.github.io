<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED I AM NHT</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white;
transition:.3s;
}
body.light{background:#fff;color:#000}

/* HEADER TOP */
.header-top{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
font-size:12px;
}
.controls{display:flex;gap:6px;}
.btn-mini{
padding:5px 10px;
border-radius:10px;
background:#1c1c1e;
cursor:pointer;
}
body.light .btn-mini{background:#ddd;}

/* LOGO */
.logo{text-align:center}
.logo img{
width:120px;
border-radius:50%;
box-shadow:0 0 25px #0a84ff;
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}
body.light .box{background:#eee;}

/* MENU */
.menu-title{
display:flex;
justify-content:space-between;
cursor:pointer;
font-weight:700;
}
.arrow{transition:.3s;}
.arrow.rotate{transform:rotate(180deg);}

.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:.4s;
}
.menu-content.open{
max-height:1200px;
opacity:1;
margin-top:10px;
}

/* APP ITEM (GIỮ NGUYÊN) */
.app-item{
display:flex;
flex-direction:column;
align-items:center;
background:#2c2c2e;
padding:15px;
border-radius:18px;
margin:12px 0;
}
.app-item img{
width:60px;
border-radius:15px;
margin-bottom:10px;
box-shadow:0 0 15px #0a84ff;
}

/* BUTTON */
.copy-btn{
background:#0a84ff;
padding:14px;
border-radius:14px;
width:100%;
text-align:center;
cursor:pointer;
margin-top:10px;
}

/* ESIGN */
.esign-logo{
width:90px;
border-radius:20px;
margin:15px auto;
display:block;
}
.esign-btn,.cert-btn{
background:#0a84ff;
padding:14px;
border-radius:14px;
margin-top:10px;
text-align:center;
cursor:pointer;
}

/* VIDEO */
.video-btn{
display:flex;
justify-content:space-between;
padding:14px;
margin-top:10px;
background:#2c2c2e;
border-radius:14px;
cursor:pointer;
}
.video-btn.active{background:#0a84ff}

.video{
max-height:0;
overflow:hidden;
opacity:0;
transition:.4s;
text-align:center;
}
.video.open{
max-height:600px;
opacity:1;
}
.video iframe{
width:100%;
max-width:320px;
height:550px;
border-radius:15px;
}

/* TOAST */
#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:12px 20px;
border-radius:14px;
opacity:0;
transition:.3s;
}
#toast.show{opacity:1;}
</style>

<script>
/* FIREBASE */
const firebaseConfig={
apiKey:"AIzaSyDcmYnUovHHHBWFATXuLG3o4oGcnLKhwnQ",
databaseURL:"https://iamnht-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* ONLINE */
let onlineRef=db.ref("online");
let userRef=onlineRef.push();
userRef.set(true);
userRef.onDisconnect().remove();

onlineRef.on("value",s=>{
document.getElementById("online").innerText=s.numChildren();
});

/* DNS */
let dnsRef=db.ref("dns");
dnsRef.on("value",s=>{
document.getElementById("dns").innerText=s.val()||0;
});

function downloadDNS(){
dnsRef.transaction(n=>(n||0)+1);
window.location.href='https://raw.githubusercontent.com/ngohongthai1402/dns/ngohongthai/dns.mobileconfig';
toast("📥 Đang tải DNS...");
}

/* UI */
function toggleMenu(id,arrow){
let el=document.getElementById(id);
el.classList.toggle("open");
arrow.classList.toggle("rotate");
}

function toggleTheme(btn){
document.body.classList.toggle("light");
btn.innerText=document.body.classList.contains("light")?"☀️":"🌙";
}

function toast(msg){
let t=document.getElementById("toast");
t.innerHTML=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

/* VIDEO */
let currentVideo=null,players={};
let tag=document.createElement('script');
tag.src="https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

function onYouTubeIframeAPIReady(){
["v1","v2"].forEach(id=>{
players[id]=new YT.Player(id+"-frame");
});
}

function toggleVideo(id,btn){
if(currentVideo===id){
players[id].pauseVideo();
document.getElementById(id).classList.remove("open");
btn.classList.remove("active");
currentVideo=null;
return;
}
for(let v in players){
players[v].pauseVideo();
document.getElementById(v).classList.remove("open");
}
document.getElementById(id).classList.add("open");
players[id].playVideo();
btn.classList.add("active");
currentVideo=id;
}
</script>

</head>

<body>

<!-- HEADER -->
<div class="header-top">
<div>👥 <span id="online">0</span> | 🔫 <span id="dns">0</span></div>

<div class="controls">
<div class="btn-mini" onclick="toggleTheme(this)">🌙</div>
</div>
</div>

<div class="logo">
<img src="logo.png">
</div>

<!-- SPEED -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu1',this.querySelector('.arrow'))">
<span>DANH SÁCH SPEED</span>
<span class="arrow">▼</span>
</div>

<div id="menu1" class="menu-content">

<div class="app-item">
<img src="logogame.png">
<div>ĐẾM VÒNG V1</div>
<div class="copy-btn">SAO CHÉP</div>
</div>

<div class="app-item">
<img src="logogame.png">
<div>ĐẾM VÒNG V2</div>
<div class="copy-btn">SAO CHÉP</div>
</div>

</div>
</div>

<!-- DNS -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menuDNS',this.querySelector('.arrow'))">
<span>DNS CHẶN THU HỒI</span>
<span class="arrow">▼</span>
</div>

<div id="menuDNS" class="menu-content">
<div class="copy-btn" onclick="downloadDNS()">TẢI DNS</div>
</div>
</div>

<!-- ESIGN -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu2',this.querySelector('.arrow'))">
<span>ESIGN AXITAT</span>
<span class="arrow">▼</span>
</div>

<div id="menu2" class="menu-content">
<img src="esign.png" class="esign-logo">
<div class="esign-btn">CÀI ESIGN</div>
<div class="cert-btn">TẢI CHỨNG CHỈ</div>
</div>
</div>

<!-- VIDEO -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu3',this.querySelector('.arrow'))">
<span>VIDEO HƯỚNG DẪN</span>
<span class="arrow">▼</span>
</div>

<div id="menu3" class="menu-content">

<div class="video-btn" onclick="toggleVideo('v1',this)">VIDEO 1</div>
<div id="v1" class="video">
<iframe id="v1-frame" src="https://www.youtube.com/embed/8ynQoiww9d4?enablejsapi=1"></iframe>
</div>

</div>
</div>

<div id="toast"></div>

</body>
</html>
