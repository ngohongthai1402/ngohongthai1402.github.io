<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED I AM NHT</title><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system}

/* ===== THEME ===== */
body{
background:#0f0f0f;
color:#fff;
transition:.3s;
}
.light{
background:#f2f2f7;
color:#000;
}

/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
padding:15px;
font-size:22px;
font-weight:800;
}

/* BUTTON DARK MODE */
.theme-btn{
position:fixed;
top:15px;
right:15px;
background:#0a84ff;
width:45px;height:45px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
box-shadow:0 0 15px #0a84ff;
z-index:10001;
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
transition:.3s;
}
.light .box{
background:#fff;
}

/* MENU */
.menu-title{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
font-weight:700;
}
.arrow{transition:.3s;}
.arrow.rotate{transform:rotate(180deg);}

.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:.4s;
}
.menu-content.open{
max-height:1200px;
opacity:1;
margin-top:10px;
}

/* BUTTON */
.copy-btn{
background:#0a84ff;
padding:14px;
border-radius:14px;
text-align:center;
margin-top:10px;
font-weight:700;
box-shadow:0 0 15px #0a84ff;
cursor:pointer;
}

/* ===== IOS MENU ===== */
#iosOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:9999;
}
#iosOverlay.active{opacity:1;pointer-events:auto;}

#iosMenu{
position:fixed;
bottom:-100%;
left:0;
width:100%;
background:#111;
border-radius:25px 25px 0 0;
padding:15px;
transition:.35s cubic-bezier(.25,.8,.25,1);
z-index:10000;
}
#iosMenu.active{bottom:0;}

.handle{
width:50px;height:5px;
background:#555;
border-radius:10px;
margin:auto;
}

.ios-item{
display:flex;
align-items:center;
gap:12px;
padding:14px;
border-radius:14px;
margin-top:10px;
background:#1c1c1e;
font-weight:600;
}
.light .ios-item{background:#e5e5ea;}

.ios-icon{
width:35px;height:35px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(45deg,#ff00cc,#3333ff);
box-shadow:0 0 10px #ff00cc,0 0 20px #3333ff;
}

.ios-btn{
position:fixed;
bottom:20px;
right:20px;
width:55px;height:55px;
border-radius:50%;
background:#0a84ff;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
box-shadow:0 0 20px #0a84ff;
z-index:10001;
}
</style></head><body><header>
Ngô Hồng Thái ✔
</header><!-- DARK MODE --><div class="theme-btn" onclick="toggleTheme()">🌙</div><!-- CONTENT --><div class="box">
<div class="menu-title" onclick="toggleMenu('m1',this.querySelector('.arrow'))">
<span>DANH SÁCH SPEED</span>
<span class="arrow">▼</span>
</div>
<div id="m1" class="menu-content">
<div class="copy-btn" onclick="copy('https://example.com')">SAO CHÉP</div>
</div>
</div><div class="box">
<div class="menu-title" onclick="toggleMenu('m2',this.querySelector('.arrow'))">
<span>DNS CHẶN THU HỒI</span>
<span class="arrow">▼</span>
</div>
<div id="m2" class="menu-content">
<div class="copy-btn">TẢI DNS</div>
</div>
</div><!-- IOS MENU --><div id="iosOverlay" onclick="closeIOSMenu()"></div><div id="iosMenu">
<div class="handle"></div><div class="ios-item"><div class="ios-icon">📦</div> ESign</div>
<div class="ios-item"><div class="ios-icon">🛡</div> Anti Revoke</div>
<div class="ios-item"><div class="ios-icon">🌐</div> DNS</div>
<div class="ios-item"><div class="ios-icon">📲</div> Install</div></div><div class="ios-btn" onclick="openIOSMenu()">⚡</div><script>
function toggleMenu(id,arrow){
let el=document.getElementById(id);
el.classList.toggle("open");
arrow.classList.toggle("rotate");
}

function copy(text){
navigator.clipboard.writeText(text);
alert("Đã copy");
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light");
}

/* IOS MENU */
let m=document.getElementById("iosMenu");
let o=document.getElementById("iosOverlay");

function openIOSMenu(){
m.classList.add("active");
o.classList.add("active");
if(navigator.vibrate) navigator.vibrate(30);
}

function closeIOSMenu(){
m.classList.remove("active");
o.classList.remove("active");
}

/* SWIPE */
let s=0,c=0;
m.addEventListener("touchstart",e=>s=e.touches[0].clientY);
m.addEventListener("touchmove",e=>{
c=e.touches[0].clientY;
let d=c-s;
if(d>0)m.style.transform=`translateY(${d}px)`
});
m.addEventListener("touchend",()=>{
if(c-s>120)closeIOSMenu();
m.style.transform="";
});
</script></body>
</html>
