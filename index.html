<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
background:#0f0f0f;
color:white
}

/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
gap:3px;
padding:15px;
font-size:20px;
font-weight:700;
}

/* TICK TELE */
.tick{
width:18px;
height:18px;
margin-left:1px;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}
.tick::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:#0a84ff;
clip-path:polygon(
50% 0%, 65% 15%, 85% 15%, 90% 35%,
100% 50%, 90% 65%, 85% 85%, 65% 85%,
50% 100%, 35% 85%, 15% 85%, 10% 65%,
0% 50%, 10% 35%, 15% 15%, 35% 15%
);
box-shadow:0 0 10px #0a84ff;
animation:spinFlower 4s linear infinite;
}
.tick::after{
content:"✔";
color:white;
font-size:10px;
font-weight:bold;
z-index:1;
}
@keyframes spinFlower{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* LOGO */
.logo{text-align:center}
.logo img{
width:120px;
border-radius:50%;
box-shadow:0 0 25px #0a84ff
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

/* MENU */
.menu-title{
font-size:18px;
font-weight:700;
cursor:pointer;
display:flex;
justify-content:space-between;
}
.menu-content{
display:none;
margin-top:10px;
}

/* APP */
.app-item{
display:flex;
flex-direction:column;
align-items:center;
background:#2c2c2e;
padding:15px;
border-radius:18px;
margin:12px 0;
}
.app-item img{
width:60px;
border-radius:15px;
margin-bottom:10px;
box-shadow:0 0 20px #0a84ff;
}
.app-title{
font-size:17px;
font-weight:700;
margin-bottom:10px;
}

/* COPY BUTTON */
.copy-btn{
background:#0a84ff;
padding:12px;
border-radius:12px;
font-weight:600;
font-size:15px;
width:80%;
text-align:center;
box-shadow:0 0 15px #0a84ff;
cursor:pointer;
}
.copy-btn:active{transform:scale(0.95);}

/* ESIGN */
.esign-logo{
width:80px;
border-radius:15px;
margin-bottom:10px;
box-shadow:0 0 20px #0a84ff;
}
.esign-btn, .cert-btn{
display:flex;
justify-content:center;
align-items:center;
padding:14px;
border-radius:14px;
font-weight:700;
margin-top:10px;
background:#0a84ff;
box-shadow:0 0 15px #0a84ff;
cursor:pointer;
}

/* DOT NHẤP NHÁY */
.dot{
width:10px;
height:10px;
background:#00ffcc;
border-radius:50%;
margin-left:6px;
animation:blink 1s infinite;
}
@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

/* VIDEO */
.video-btn{
display:flex;
justify-content:center;
align-items:center;
padding:14px;
border-radius:14px;
margin-top:10px;
background:#2c2c2e;
font-size:15px;
font-weight:700;
cursor:pointer;
}
.video-btn.active{
background:#0a84ff;
box-shadow:0 0 15px #0a84ff;
}
.video{
display:none;
margin-top:10px;
text-align:center;
}
.video iframe{
width:100%;
max-width:320px;
height:550px;
border-radius:15px;
}

/* TOAST XỊN */
#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%) translateY(20px);
background:rgba(20,20,20,0.95);
backdrop-filter:blur(10px);
padding:12px 20px;
border-radius:14px;
font-weight:600;
font-size:14px;
display:flex;
align-items:center;
gap:8px;
color:#fff;
box-shadow:0 0 15px rgba(0,0,0,0.5);
opacity:0;
pointer-events:none;
transition:all 0.35s ease;
}

#toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

.toast-icon{
color:#34c759;
font-size:16px;
animation:pop 0.3s ease;
}

@keyframes pop{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

a{color:inherit;text-decoration:none;}
</style>

<script>
function toggleMenu(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block"?"none":"block";
}

/* COPY + TOAST */
function copyLink(link){
navigator.clipboard.writeText(link);
showToast();
}

function showToast(){
let t=document.getElementById("toast");
t.innerHTML='<span class="toast-icon">✔</span> Đã sao chép link';
t.classList.add("show");

setTimeout(()=>{
t.classList.remove("show");
},2000);
}

/* VIDEO */
function showVideo(id,btn){
let videos=document.querySelectorAll(".video");
let buttons=document.querySelectorAll(".video-btn");

videos.forEach(v=>v.style.display="none");
buttons.forEach(b=>b.classList.remove("active"));

document.getElementById(id).style.display="block";
btn.classList.add("active");
}
</script>
