<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- fallback iOS -->
<meta http-equiv="refresh" content="6; url=https://raw.githubusercontent.com/ngohongthai1402/dns/ngohongthai/dns-signed.mobileconfig">

<title>NHT CYBER</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    color:#00ffcc;
    font-family:monospace;
}

/* matrix */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* box */
.box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* glitch */
.glitch{
    font-size:22px;
    animation:glitch 1s infinite;
}
@keyframes glitch{
    0%{text-shadow:2px 0 red,-2px 0 blue;}
    50%{text-shadow:-2px 0 red,2px 0 blue;}
    100%{text-shadow:2px 0 red,-2px 0 blue;}
}

/* loading */
.bar{
    width:220px;
    height:6px;
    border:1px solid #00ffcc;
    margin-top:10px;
}
.fill{
    height:100%;
    width:0%;
    background:#00ffcc;
}

/* percent */
.percent{
    font-size:13px;
    margin-top:5px;
}

/* visual */
.visual{
    display:flex;
    justify-content:center;
    margin-top:15px;
}
.visual div{
    width:4px;
    height:20px;
    margin:2px;
    background:#00ffcc;
    animation:jump 0.5s infinite;
}
@keyframes jump{
    50%{height:60px;}
}

/* hacker text */
.hack{
    font-size:12px;
    margin-top:10px;
    opacity:0.7;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="box">

<div class="glitch">SPEED I AM NHT 🔫</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<div class="percent" id="percent">0%</div>

<div class="visual" id="visual"></div>

<div class="hack" id="hack"></div>

</div>

<!-- SOUND CLOUD PLAYER -->
<iframe 
id="scplayer"
width="0"
height="0"
allow="autoplay"
frameborder="no">
</iframe>

<script>
// ===== MATRIX =====
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

const letters="01NHT";
const fontSize=14;
const columns=c.width/fontSize;
const drops=Array(Math.floor(columns)).fill(1);

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle="#0f0";
    ctx.font=fontSize+"px monospace";
    drops.forEach((y,i)=>{
        const text=letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,y*fontSize);
        if(y*fontSize>c.height && Math.random()>0.975) drops[i]=0;
        drops[i]++;
    });
}
setInterval(draw,33);

// ===== SOUND CLOUD =====
const scList=[
"https://soundcloud.com/be-khang-150266263/viet-mix-suy-vol8-hot-tiktok-dj-pi-sua",
"https://soundcloud.com/be-khang-150266263/viet-mix-suy",
"https://soundcloud.com/an-hoang-302656292/nonstop-vol9-phan-boi-chinh-minh-an-hoang"
];

const random=scList[Math.floor(Math.random()*scList.length)];

document.getElementById("scplayer").src=
"https://w.soundcloud.com/player/?url="+encodeURIComponent(random)+"&auto_play=true";

// ===== VISUAL FAKE =====
const visual=document.getElementById("visual");
for(let i=0;i<25;i++){
    let bar=document.createElement("div");
    bar.style.animationDelay=(Math.random()*0.5)+"s";
    visual.appendChild(bar);
}

// ===== HACK TEXT =====
const hack=document.getElementById("hack");
const text="> Initializing...\n> Bypass Apple...\n> Inject DNS...\n> SUCCESS";
let t=0;
function type(){
    if(t<text.length){
        hack.innerText+=text[t];
        t++;
        setTimeout(type,30);
    }
}
type();

// ===== LOADING =====
let i=0;
const fill=document.getElementById("fill");
const percent=document.getElementById("percent");

let load=setInterval(()=>{
    if(i>=100){
        clearInterval(load);

        setTimeout(()=>{
            window.location.href="https://raw.githubusercontent.com/ngohongthai1402/dns/ngohongthai/dns-signed.mobileconfig";
        },500);

    }else{
        i++;
        fill.style.width=i+"%";
        percent.innerText=i+"%";
    }
},40);
</script>

</body>
</html>
