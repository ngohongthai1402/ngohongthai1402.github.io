<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED I AM NHT</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white;
transition:0.3s;
}

/* LIGHT */
body.light{
background:#fff;
color:#000;
}

/* HEADER */
header{
padding:12px;
text-align:center;
}

/* TOP BAR */
.header-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.counter{
font-size:12px;
opacity:0.9;
}

/* SWITCH iOS */
.switch{
width:42px;
height:24px;
background:#333;
border-radius:20px;
position:relative;
cursor:pointer;
transition:0.3s;
}
.switch::after{
content:"";
width:18px;
height:18px;
background:#fff;
border-radius:50%;
position:absolute;
top:3px;
left:3px;
transition:0.3s;
}
.switch.active{
background:#000;
}
.switch.active::after{
left:21px;
background:#fff;
}

.controls{
display:flex;
gap:8px;
align-items:center;
}

.btn-mini{
padding:5px 10px;
border-radius:10px;
background:#1c1c1e;
font-size:12px;
cursor:pointer;
}
body.light .btn-mini{background:#ddd;}

/* LOGO */
.logo{text-align:center}
.logo img{
width:120px;
border-radius:50%;
box-shadow:0 0 25px #0a84ff;
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}
body.light .box{background:#eee;}

/* MENU */
.menu-title{
display:flex;
justify-content:space-between;
cursor:pointer;
font-weight:700;
}
.arrow{transition:0.3s;}
.arrow.rotate{transform:rotate(180deg);}

.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.4s;
}
.menu-content.open{
max-height:1200px;
opacity:1;
margin-top:10px;
}

/* BUTTON */
.copy-btn{
background:#0a84ff;
padding:14px;
border-radius:14px;
text-align:center;
margin-top:10px;
cursor:pointer;
}

/* TOAST */
#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:12px 20px;
border-radius:14px;
opacity:0;
transition:0.3s;
}
#toast.show{opacity:1;}
</style>

<script>
/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyDcmYnUovHHHBWFATXuLG3o4oGcnLKhwnQ",
authDomain:"iamnht.firebaseapp.com",
databaseURL:"https://iamnht-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"iamnht"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* ONLINE */
let onlineRef=db.ref("online");
let userRef=onlineRef.push();
userRef.set(true);
userRef.onDisconnect().remove();

onlineRef.on("value",snap=>{
document.getElementById("online").innerText=snap.numChildren();
});

/* DNS */
let dnsRef=db.ref("dns");
dnsRef.on("value",snap=>{
document.getElementById("dns").innerText=snap.val()||0;
});

/* DOWNLOAD */
function downloadDNS(btn){
dnsRef.transaction(n=>(n||0)+1);
window.location.href='https://raw.githubusercontent.com/ngohongthai1402/dns/ngohongthai/dns.mobileconfig';
toast("📥 Đang tải DNS...");
}

/* MENU */
function toggleMenu(id,arrow){
let el=document.getElementById(id);
el.classList.toggle("open");
arrow.classList.toggle("rotate");
}

/* THEME SWITCH */
function toggleTheme(){
let sw=document.getElementById("switch");

if(document.body.classList.contains("light")){
document.body.classList.remove("light");
sw.classList.remove("active");
localStorage.setItem("theme","dark");
}else{
document.body.classList.add("light");
sw.classList.add("active");
localStorage.setItem("theme","light");
}
}

/* LOAD THEME */
window.onload=()=>{
let t=localStorage.getItem("theme");
let sw=document.getElementById("switch");

if(t==="light"){
document.body.classList.add("light");
sw.classList.add("active");
}
};

/* LANGUAGE */
function setLang(l){
localStorage.setItem("lang",l);
}

function loadLang(){
let l=localStorage.getItem("lang")||"vi";
document.documentElement.lang=l;
}

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

loadLang();
</script>

</head>

<body>

<header>

<div class="header-top">
<div class="counter">
👥 <span id="online">0</span> | 📥 <span id="dns">0</span>
</div>

<div class="controls">
<div class="btn-mini" onclick="setLang('vi')">VI</div>
<div class="btn-mini" onclick="setLang('en')">EN</div>
<div class="switch" id="switch" onclick="toggleTheme()"></div>
</div>
</div>

Ngô Hồng Thái <span class="tick"></span>

</header>

<div class="logo">
<img src="logo.png">
</div>

<!-- SPEED -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu1',this.querySelector('.arrow'))">
<span>DANH SÁCH SPEED</span>
<span class="arrow">▼</span>
</div>
<div id="menu1" class="menu-content">
<div class="copy-btn">SPEED V1</div>
<div class="copy-btn">SPEED V2</div>
<div class="copy-btn">SPEED IGG</div>
</div>
</div>

<!-- DNS -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menuDNS',this.querySelector('.arrow'))">
<span>DNS CHẶN THU HỒI</span>
<span class="arrow">▼</span>
</div>
<div id="menuDNS" class="menu-content">
<div class="copy-btn" onclick="downloadDNS(this)">TẢI NHT DNS🔫</div>
</div>
</div>

<!-- ESIGN -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu2',this.querySelector('.arrow'))">
<span>ESIGN AXITAT</span>
<span class="arrow">▼</span>
</div>
<div id="menu2" class="menu-content">
<div class="copy-btn">CÀI ESIGN</div>
<div class="copy-btn">TẢI CHỨNG CHỈ</div>
</div>
</div>

<!-- VIDEO -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu3',this.querySelector('.arrow'))">
<span>VIDEO HƯỚNG DẪN</span>
<span class="arrow">▼</span>
</div>
<div id="menu3" class="menu-content">
<div class="copy-btn">VIDEO 1</div>
<div class="copy-btn">VIDEO 2</div>
</div>
</div>

<div id="toast"></div>

</body>
</html>
