<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED I AM NHT</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system;background:#0f0f0f;color:white}

/* HEADER */
header{
display:flex;justify-content:center;align-items:center;
padding:15px;font-size:20px;font-weight:700;
}

/* LOGO */
.logo{text-align:center;overflow:hidden}
.logo img{
width:120px;max-width:90%;
border-radius:50%;
box-shadow:0 0 25px #0a84ff;
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

/* MENU */
.menu-title{
display:flex;justify-content:space-between;
cursor:pointer;font-weight:700;
}
.arrow{transition:0.3s;}
.arrow.rotate{transform:rotate(180deg);}

.menu-content{
max-height:0;overflow:hidden;opacity:0;
transition:0.4s;
}
.menu-content.open{
max-height:1500px;opacity:1;margin-top:10px;
}

/* BUTTON */
.copy-btn{
background:#0a84ff;
padding:14px;border-radius:14px;
text-align:center;cursor:pointer;margin-top:10px;
}

/* IOS MENU */
.menu-btn{
position:fixed;top:20px;left:15px;
width:45px;height:45px;border-radius:15px;
background:#1c1c1e;display:flex;
align-items:center;justify-content:center;
font-size:22px;z-index:999;cursor:pointer;
}

.menu-panel{
position:fixed;top:0;left:-100%;
width:75%;height:100%;
background:#111;padding:20px;
transition:0.4s;z-index:998;
}
.menu-panel.open{left:0;}

.menu-item{
padding:15px;margin-bottom:10px;
background:#1c1c1e;border-radius:12px;
cursor:pointer;
}

/* ESIGN */
.esign-logo{
width:90px;
border-radius:20px;
margin:15px auto;
display:block;
box-shadow:0 0 25px #0a84ff;
animation:spinLogo 6s linear infinite;
}
@keyframes spinLogo{
100%{transform:rotate(360deg);}
}

.esign-btn{
background:linear-gradient(45deg,#0a84ff,#00c6ff);
padding:14px;border-radius:14px;
margin-top:12px;font-weight:700;
cursor:pointer;text-align:center;
box-shadow:0 0 20px #0a84ff;
}

.cert-btn{
background:#2c2c2e;
padding:14px;border-radius:14px;
margin-top:12px;text-align:center;
cursor:pointer;
border:1px solid #00ffcc;
}

/* FOOTER */
.footer{
margin-top:30px;
padding:20px;
text-align:center;
background:#1c1c1e;
}
.footer-box{
display:flex;justify-content:center;gap:15px;margin-bottom:10px;
}
.footer-item{
background:#2c2c2e;padding:10px 15px;border-radius:12px;
}
.footer span{color:#0a84ff;font-weight:bold;}
</style>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, onDisconnect, push, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDcmYnUovHHHBWFATXuLG3o4oGcnLKhwnQ",
  databaseURL: "https://iamnht-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ONLINE */
const userRef = push(ref(db,"online"));
set(userRef,true);
onDisconnect(userRef).remove();

onValue(ref(db,"online"),snap=>{
document.getElementById("onlineFooter").innerText = snap.size || 0;
});

/* DNS */
window.downloadDNS = function(){
runTransaction(ref(db,"dns_download"),x=>(x||0)+1);
window.location.href='https://raw.githubusercontent.com/ngohongthai1402/dns/ngohongthai/dns.mobileconfig';
}

onValue(ref(db,"dns_download"),snap=>{
document.getElementById("dnsFooter").innerText = snap.val() || 0;
});
</script>

<script>
function toggleMenu(id,arrow){
let el=document.getElementById(id);
el.classList.toggle("open");
arrow.classList.toggle("rotate");
}
function toggleIOS(){
document.getElementById("panel").classList.toggle("open");
}
</script>

</head>

<body>

<div class="menu-btn" onclick="toggleIOS()">☰</div>

<div class="menu-panel" id="panel">
<h3>📱 MENU</h3>
<div class="menu-item">🎮 Coin Master</div>
<div class="menu-item">📱 Lấy UDID</div>
<div class="menu-item">📝 Ký IPA</div>
<div class="menu-item">📦 Kho App</div>
</div>

<header>Ngô Hồng Thái</header>

<div class="logo">
<img src="logo3.png">
</div>

<!-- SPEED -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('m1',this.querySelector('.arrow'))">
<span>DANH SÁCH SPEED</span>
<span class="arrow">▼</span>
</div>

<div id="m1" class="menu-content">
<div class="copy-btn">ĐẾM VÒNG V1</div>
<div class="copy-btn">ĐẾM VÒNG V2</div>
<div class="copy-btn">SPEED IGG</div>
</div>
</div>

<!-- DNS -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('dns',this.querySelector('.arrow'))">
<span>DNS CHẶN THU HỒI</span>
<span class="arrow">▼</span>
</div>

<div id="dns" class="menu-content">
<div class="copy-btn" onclick="downloadDNS()">📥 TẢI NHT DNS</div>
</div>
</div>

<!-- ESIGN -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu2',this.querySelector('.arrow'))">
<span>ESIGN AXITAT 🔥</span>
<span class="arrow">▼</span>
</div>

<div id="menu2" class="menu-content" style="text-align:center;">

<img src="esign.png" class="esign-logo">

<div class="esign-btn"
onclick="window.location.href='itms-services://?action=download-manifest&url=https://ngohongthai1402.github.io/esign.plist'">
🚀 CÀI ĐẶT ESIGN
</div>

<div class="cert-btn"
onclick="window.location.href='https://github.com/ngohongthai1402/ngohongthai1402.github.io/raw/refs/heads/main/CertificateAxitat.zip'">
📥 TẢI CHỨNG CHỈ
</div>

</div>
</div>

<!-- FOOTER -->
<div class="footer">

<div class="footer-box">
<div class="footer-item">
👥 Online: <span id="onlineFooter">0</span>
</div>

<div class="footer-item">
📥 DNS: <span id="dnsFooter">0</span>
</div>
</div>

<div>Ngô Hồng Thái đang tập làm web lỏ 😅</div>

</div>

</body>
</html>
