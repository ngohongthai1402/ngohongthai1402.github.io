<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I AM NHT</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white;
}

/* NAV */
.navbar{
display:flex;
justify-content:space-between;
padding:12px;
background:#1c1c1e;
}

.lang button{
border:none;
background:#2c2c2e;
color:#fff;
padding:6px 10px;
border-radius:8px;
}

.counter-top{
font-size:13px;
}

.toggle{
cursor:pointer;
}

/* HEADER */
header{text-align:center;font-size:20px;margin-top:10px;}

/* LOGO */
.logo img{
width:140px;height:140px;border-radius:50%;
display:block;margin:10px auto;
object-fit:cover;
transform:scale(1.15);
box-shadow:0 0 25px #0a84ff;
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

.menu-title{
display:flex;
justify-content:space-between;
cursor:pointer;
font-weight:700;
}

.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.3s;
}
.menu-content.open{
max-height:2000px;
opacity:1;
margin-top:10px;
}

/* APP ITEM */
.app{
background:#2c2c2e;
padding:12px;
border-radius:14px;
margin-top:10px;
text-align:center;
}

.btn{
background:#0a84ff;
padding:10px;
border-radius:10px;
margin-top:8px;
cursor:pointer;
}

/* VIDEO */
.video{
margin-top:10px;
}
iframe{
width:100%;
height:200px;
border-radius:12px;
}

/* FOOTER */
.footer{text-align:center;margin:20px;}
.badge{
background:#1c1c1e;
padding:10px;
border-radius:10px;
margin:5px;
display:inline-block;
}
</style>

</head>

<body>

<!-- NAV -->
<div class="navbar">
<div class="lang">
<button>VI</button>
<button>EN</button>
</div>

<div class="counter-top">
👥 <span id="online">0</span> | 📥 <span id="dns">0</span>
</div>

<div class="toggle">🌙</div>
</div>

<header>Ngô Hồng Thái ✔</header>

<div class="logo">
<img src="logo.png">
</div>

<!-- SPEED -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('speed')">
<span>DANH SÁCH SPEED (3 PHIÊN BẢN)</span>
<span>▼</span>
</div>

<div id="speed" class="menu-content">

<div class="app">
ĐẾM VÒNG V1
<div class="btn">SAO CHÉP</div>
</div>

<div class="app">
ĐẾM VÒNG V2
<div class="btn">SAO CHÉP</div>
</div>

<div class="app">
SPEED IGG
<div class="btn">SAO CHÉP</div>
</div>

</div>
</div>

<!-- ESIGN -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('esign')">
<span>ESIGN AXITAT</span>
<span style="color:#00ffcc">●</span>
</div>

<div id="esign" class="menu-content">

<div class="btn">CÀI ESIGN</div>
<div class="btn">TẢI CHỨNG CHỈ</div>

</div>
</div>

<!-- VIDEO -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('video')">
<span>VIDEO HƯỚNG DẪN (3 VIDEO)</span>
<span>▼</span>
</div>

<div id="video" class="menu-content">

<div class="video">
<iframe src="https://www.youtube.com/embed/8ynQoiww9d4"></iframe>
</div>

<div class="video">
<iframe src="https://www.youtube.com/embed/e74h1eb3b0c"></iframe>
</div>

<div class="video">
<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</div>

</div>
</div>

<!-- FOOTER -->
<div class="footer">
<div class="badge">Online: <span id="online2">0</span></div>
<div class="badge">DNS: <span id="dns2">0</span></div>

<div>Ngô Hồng Thái đang tập làm web lỏ 😆</div>
</div>

<script>
function toggleMenu(id){
document.getElementById(id).classList.toggle("open");
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDcmYnUovHHHBWFATXuLG3o4oGcnLKhwnQ",
authDomain: "iamnht.firebaseapp.com",
databaseURL: "https://iamnht-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "iamnht",
storageBucket: "iamnht.firebasestorage.app",
messagingSenderId: "359554660567",
appId: "1:359554660567:web:84c9b72e079067e6ef1892"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ONLINE */
const userRef = ref(db, "online/" + Date.now());
set(userRef, true);
onDisconnect(userRef).remove();

onValue(ref(db, "online"), snap => {
const c = snap.size || 0;
online.innerText = c;
online2.innerText = c;
});

/* DNS */
onValue(ref(db, "dns"), snap => {
const v = snap.val() || 0;
dns.innerText = v;
dns2.innerText = v;
});
</script>

</body>
