<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED I AM NHT</title><style>
*{box-sizing:border-box;}

/* ===== THEME ===== */
body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white;
transition:.3s;
}
body.light{
background:#f2f2f7;
color:#000;
}

/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
padding:15px;
font-size:20px;
font-weight:700;
}

/* DARK MODE BUTTON */
.theme-toggle{
position:fixed;
top:15px;
right:15px;
width:45px;height:45px;
border-radius:12px;
background:#0a84ff;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
box-shadow:0 0 15px #0a84ff;
z-index:9999;
cursor:pointer;
}

/* LOGO */
.logo{text-align:center}
.logo img{
width:120px;border-radius:50%;
box-shadow:0 0 25px #0a84ff
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
overflow:hidden;
transition:.3s;
}
body.light .box{
background:#fff;
}

/* MENU */
.menu-title{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
font-weight:700;
}
.arrow{transition:0.3s;}
.arrow.rotate{transform:rotate(180deg);}

.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.4s ease;
}
.menu-content.open{
max-height:1200px;
opacity:1;
margin-top:10px;
}

/* DOT */
.menu-dot{
width:10px;height:10px;
background:#0a84ff;
border-radius:50%;
box-shadow:0 0 10px #0a84ff;
animation:blink 1s infinite;
}

/* SPEED */
.app-item{
display:flex;
flex-direction:column;
align-items:center;
background:#2c2c2e;
padding:15px;
border-radius:18px;
margin:12px 0;
transition:.3s;
}
body.light .app-item{
background:#e5e5ea;
}

.app-item img{
width:60px;border-radius:15px;
margin-bottom:10px;
box-shadow:0 0 15px #0a84ff;
}

/* BUTTON */
.copy-btn{
background:#0a84ff;
box-shadow:0 0 15px #0a84ff;
padding:14px;
border-radius:14px;
width:100%;
text-align:center;
cursor:pointer;
position:relative;
overflow:hidden;
margin-top:10px;
}

/* ripple */
.copy-btn::after{
content:"";
position:absolute;
width:10px;height:10px;
background:rgba(255,255,255,0.5);
border-radius:50%;
transform:scale(0);
}
.copy-btn.ripple::after{
animation:ripple 0.6s;
}
@keyframes ripple{
0%{transform:scale(0);opacity:1;}
100%{transform:scale(20);opacity:0;}
}

/* ESIGN */
.esign-logo{
width:90px;border-radius:20px;
margin:15px auto;
display:block;
box-shadow:0 0 25px #0a84ff;
}
.esign-btn,.cert-btn{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
background:#0a84ff;
padding:14px;
border-radius:14px;
margin-top:12px;
font-weight:700;
box-shadow:0 0 15px #0a84ff;
cursor:pointer;
}

/* VIDEO */
.video-btn{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
border-radius:14px;
margin-top:10px;
background:#2c2c2e;
cursor:pointer;
transition:.3s;
}
body.light .video-btn{
background:#e5e5ea;
}

.video-btn.active{
background:#0a84ff;
box-shadow:0 0 15px #0a84ff;
}

.video{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.4s;
text-align:center;
}
.video.open{
max-height:600px;
opacity:1;
margin-top:10px;
}

/* TOAST */
#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:12px 20px;
border-radius:14px;
opacity:0;
transition:0.3s;
}
#toast.show{opacity:1;}
body.light #toast{
background:#ddd;
color:#000;
}
</style><script>
/* ===== THEME ===== */
function toggleTheme(){
document.body.classList.toggle("light");
localStorage.setItem("theme", document.body.classList.contains("light") ? "light":"dark");
}

window.onload=function(){
if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
}
}

/* ===== CODE CŨ GIỮ NGUYÊN ===== */
let currentVideo=null;
let players={};
let muteState={};

let tag=document.createElement('script');
tag.src="https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

function onYouTubeIframeAPIReady(){
["v1","v2"].forEach(id=>{
players[id]=new YT.Player(id+"-frame");
muteState[id]=true;
});
}

function toggleMenu(id,arrow){
let el=document.getElementById(id);
el.classList.toggle("open");
arrow.classList.toggle("rotate");
}

function copyLink(link,btn){
navigator.clipboard.writeText(link);
btn.classList.add("ripple");
setTimeout(()=>btn.classList.remove("ripple"),600);

let t=document.getElementById("toast");
t.innerHTML="✔ Đã sao chép link";
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

function downloadDNS(btn){
btn.classList.add("ripple");
setTimeout(()=>btn.classList.remove("ripple"),600);

window.location.href='https://raw.githubusercontent.com/ngohongthai1402/dns/ngohongthai/dns.mobileconfig';

let t=document.getElementById("toast");
t.innerHTML="📥 Đang tải NHT DNS...";
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

function toggleVideo(id,btn){
if(currentVideo===id){
players[id].pauseVideo();
document.getElementById(id).classList.remove("open");
btn.classList.remove("active");
btn.querySelector(".play").innerHTML="▶";
currentVideo=null;
return;
}

for(let v in players){
players[v].pauseVideo();
document.getElementById(v).classList.remove("open");

let b=document.querySelector(`[data-id="${v}"]`);
if(b){
b.classList.remove("active");
b.querySelector(".play").innerHTML="▶";
}
}

document.getElementById(id).classList.add("open");
players[id].playVideo();

btn.classList.add("active");
btn.querySelector(".play").innerHTML="⏸";

currentVideo=id;
}

function toggleSound(id,icon){
if(muteState[id]){
players[id].unMute();
icon.innerHTML="🔊";
}else{
players[id].mute();
icon.innerHTML="🔇";
}
muteState[id]=!muteState[id];
}
</script></head><body><!-- NÚT DARK MODE --><div class="theme-toggle" onclick="toggleTheme()">🌙</div><header>
Ngô Hồng Thái <span class="tick"></span>
</header><div class="logo">
<img src="logo.png">
</div><!-- (PHẦN CÒN LẠI GIỮ NGUYÊN 100% NHƯ MÀY) --><div id="toast"></div></body>
</html>
