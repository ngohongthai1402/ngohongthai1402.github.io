/* BUTTON COPY */

justify-content:center;
align-items:center;

box-shadow:0 0 15px #0a84ff;

}

.copy-btn:active{
transform:scale(0.95);

/* VIDEO BUTTON */
.video-btn{
display:flex;
align-items:center;
justify-content:center;
padding:14px;
border-radius:14px;
margin-top:10px;
cursor:pointer;
background:#2c2c2e;
font-size:15px;

}

.video-btn.active{

box-shadow:0 0 15px #0a84ff;
transform:scale(0.97);
}

.video-btn:hover{
box-shadow:0 0 10px rgba(10,132,255,0.4);
}

/* VIDEO */
.video{
display:none;
margin-top:10px;
text-align:center;
animation:fadeIn 0.25s ease;
}

.video iframe{
width:100%;
max-width:320px;
height:550px;
border-radius:15px;
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0; transform:scale(0.95);}
to{opacity:1; transform:scale(1);}
}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#0a84ff;
padding:10px 20px;
border-radius:10px;
display:none;
}
</style>

<script>
function toggleMenu(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block"?"none":"block";
}

function copyLink(link){
navigator.clipboard.writeText(link);
showToast("✅ Đã sao chép!");
}

function showToast(text){
let t=document.getElementById("toast");
t.innerText=text;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* VIDEO */
function showVideo(id,btn){
let videos=document.querySelectorAll(".video");
let buttons=document.querySelectorAll(".video-btn");

videos.forEach(v=>v.style.display="none");
buttons.forEach(b=>b.classList.remove("active"));

document.getElementById(id).style.display="block";
btn.classList.add("active");
}

/* PASS VIP */
function checkPass(btn){
let pass=prompt("🔒 Nhập mật khẩu:");
if(pass==="1402"){
showVideo("v3",btn);
}else{
alert("❌ Sai mật khẩu!");
}
}
</script>
