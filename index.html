<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED I AM NHT</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white;
padding-bottom:80px;
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

/* MENU */
.menu-title{
display:flex;
justify-content:space-between;
cursor:pointer;
font-weight:700;
}

.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.4s;
}
.menu-content.open{
max-height:1200px;
opacity:1;
margin-top:10px;
}

/* ===== MUSIC VIP ===== */
.music-info{
text-align:center;
}

.music-info img{
width:90px;
border-radius:15px;
box-shadow:0 0 20px #0a84ff;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

#title{
margin-top:8px;
font-weight:bold;
}

/* controls */
.controls{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

.controls button{
padding:8px 12px;
border:none;
border-radius:10px;
background:#0a84ff;
color:white;
font-weight:bold;
box-shadow:0 0 10px #0a84ff;
}

/* toggle */
.toggle{
margin-top:10px;
text-align:center;
cursor:pointer;
color:#0a84ff;
}

/* list */
.list div{
padding:10px;
margin:5px 0;
background:#2c2c2e;
border-radius:10px;
cursor:pointer;
}
.list div:hover{
background:#0a84ff;
}
</style>

</head>

<body>

<header style="text-align:center;padding:15px;font-size:20px;font-weight:700;">
🔥 SPEED I AM NHT 🔫
</header>

<!-- ===== MUSIC VIP ===== -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('musicMenu')">
🎧 MUSIC NHT VIP
</div>

<div id="musicMenu" class="menu-content">

<div class="music-info">
<img id="thumb" src="https://i.imgur.com/8Km9tLL.jpg">
<div id="title">Chưa phát nhạc</div>
</div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="play()">▶</button>
<button onclick="pause()">⏸</button>
<button onclick="next()">⏭</button>
<button onclick="shuffle()">🔀</button>
</div>

<div class="toggle" onclick="toggleAuto()">
⚡ Auto Play: <span id="autoState">ON</span>
</div>

<div class="list">
<div onclick="playSong(0)">🎶 Viet Mix Suy Vol 8</div>
<div onclick="playSong(1)">🎶 Viet Mix Suy</div>
<div onclick="playSong(2)">🎶 Viet Mix DJ</div>
</div>

<iframe id="player" width="100%" height="0" frameborder="no" allow="autoplay"></iframe>

</div>
</div>

<script src="https://w.soundcloud.com/player/api.js"></script>

<script>
function toggleMenu(id){
document.getElementById(id).classList.toggle("open");
}

var widget = SC.Widget(document.getElementById('player'));

var list = [
{
url:"https://soundcloud.com/be-khang-150266263/viet-mix-suy-vol8-hot-tiktok-dj-pi-sua",
name:"Viet Mix Suy Vol 8",
img:"https://i.imgur.com/8Km9tLL.jpg"
},
{
url:"https://soundcloud.com/be-khang-150266263/viet-mix-suy",
name:"Viet Mix Suy",
img:"https://i.imgur.com/qYq6X5S.jpg"
},
{
url:"https://soundcloud.com/be-khang-150266263/viet-mix",
name:"Viet Mix DJ",
img:"https://i.imgur.com/4AiXzf8.jpg"
}
];

var i = 0;
var autoPlay = true;

function update(){
document.getElementById("title").innerText = list[i].name;
document.getElementById("thumb").src = list[i].img;
}

function playSong(x){
i = x;
widget.load(list[i].url,{auto_play:true});
update();
}

function play(){widget.play();}
function pause(){widget.pause();}

function next(){
i++;
if(i>=list.length) i=0;
playSong(i);
}

function prev(){
i--;
if(i<0) i=list.length-1;
playSong(i);
}

function shuffle(){
i = Math.floor(Math.random()*list.length);
playSong(i);
}

function toggleAuto(){
autoPlay = !autoPlay;
document.getElementById("autoState").innerText = autoPlay ? "ON" : "OFF";
}

/* AUTO NEXT */
widget.bind(SC.Widget.Events.FINISH, function(){
if(autoPlay) next();
});

/* AUTO PLAY KHI LOAD */
window.onload = function(){
setTimeout(()=>{
playSong(0);
},1500);
}
</script>

</body>
</html>
