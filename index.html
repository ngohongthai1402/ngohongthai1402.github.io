<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED I AM NHT</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white;
transition:0.3s;
}

/* LIGHT MODE */
body.light{
background:#f2f2f7;
color:#000;
}
body.light .box{background:#fff;}
body.light .app-item{background:#e5e5ea;}
body.light .video-btn{background:#e5e5ea;}
body.light #toast{background:#ddd;color:#000;}

/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
padding:15px;
font-size:20px;
font-weight:700;
}

/* TICK */
.tick{
width:18px;height:18px;position:relative;
display:flex;align-items:center;justify-content:center;
}
.tick::before{
content:"";
position:absolute;
width:100%;height:100%;
background:#0a84ff;
clip-path:polygon(50% 0%,65% 15%,85% 15%,90% 35%,100% 50%,90% 65%,85% 85%,65% 85%,50% 100%,35% 85%,15% 85%,10% 65%,0% 50%,10% 35%,15% 15%,35% 15%);
box-shadow:0 0 10px #0a84ff;
animation:spin 3s linear infinite;
}
.tick::after{content:"✔";font-size:10px;z-index:1;}
@keyframes spin{100%{transform:rotate(360deg);}}

/* LOGO */
.logo{text-align:center}
.logo img{
width:120px;border-radius:50%;
box-shadow:0 0 25px #0a84ff
}

/* CONTROL BAR */
.control{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.btn-mini{
padding:10px 15px;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

/* ONLINE */
#onlineBox{
background:#1c1c1e;
box-shadow:0 0 10px #00ffcc;
animation:blink 1.5s infinite;
}
body.light #onlineBox{background:#fff;}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.6}
100%{opacity:1}
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
overflow:hidden;
transition:0.3s;
}

/* MENU */
.menu-title{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
font-weight:700;
}
.arrow{transition:0.3s;}
.arrow.rotate{transform:rotate(180deg);}

.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.4s ease;
}
.menu-content.open{
max-height:1200px;
opacity:1;
margin-top:10px;
}

/* SPEED */
.app-item{
display:flex;
flex-direction:column;
align-items:center;
background:#2c2c2e;
padding:15px;
border-radius:18px;
margin:12px 0;
}
.app-item img{
width:60px;border-radius:15px;
margin-bottom:10px;
box-shadow:0 0 15px #0a84ff;
}

/* BUTTON */
.copy-btn{
background:#0a84ff;
box-shadow:0 0 15px #0a84ff;
padding:14px;
border-radius:14px;
width:100%;
text-align:center;
cursor:pointer;
margin-top:10px;
}

/* VIDEO */
.video-btn{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
border-radius:14px;
margin-top:10px;
background:#2c2c2e;
cursor:pointer;
}
.video-btn.active{
background:#0a84ff;
}

/* TOAST */
#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:12px 20px;
border-radius:14px;
opacity:0;
transition:0.3s;
}
#toast.show{opacity:1;}
</style>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
/* MENU */
function toggleMenu(id,arrow){
let el=document.getElementById(id);
el.classList.toggle("open");
arrow.classList.toggle("rotate");
}

/* COPY */
function copyLink(link,btn){
navigator.clipboard.writeText(link);
let t=document.getElementById("toast");
t.innerHTML="✔ Đã sao chép";
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light");
localStorage.setItem("theme",document.body.classList.contains("light"));
}

window.onload=()=>{
if(localStorage.getItem("theme")==="true"){
document.body.classList.add("light");
}
}

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDcmYnUovHHHBWFATXuLG3o4oGcnLKhwnQ",
  authDomain: "iamnht.firebaseapp.com",
  databaseURL: "https://iamnht-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "iamnht",
  storageBucket: "iamnht.firebasestorage.app",
  messagingSenderId: "359554660567",
  appId: "1:359554660567:web:84c9b72e079067e6ef1892"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ONLINE */
const userRef = db.ref("online").push();
userRef.set(true);
userRef.onDisconnect().remove();

db.ref("online").on("value", snap=>{
document.getElementById("onlineBox").innerHTML =
"👥 Online: " + (snap.numChildren() || 0);
});
</script>

</head>

<body>

<header>
Ngô Hồng Thái <span class="tick"></span>
</header>

<div class="logo">
<img src="logo.png">
</div>

<!-- CONTROL -->
<div class="control">
<div class="btn-mini" style="background:#0a84ff;" onclick="toggleTheme()">🌙 / ☀️</div>
<div class="btn-mini" id="onlineBox">👥 Online: 0</div>
</div>

<!-- SPEED -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu1',this.querySelector('.arrow'))">
<span>DANH SÁCH SPEED</span>
<span class="arrow">▼</span>
</div>

<div id="menu1" class="menu-content">

<div class="app-item">
<img src="logogame.png">
<div>ĐẾM VÒNG V1</div>
<div class="copy-btn" onclick="copyLink('https://zsign.s3.vn-hcm-1.vietnix.cloud/ipa/69d541a1e17ae_DV12500.ipa',this)">SAO CHÉP</div>
</div>

<div class="app-item">
<img src="logogame.png">
<div>ĐẾM VÒNG V2</div>
<div class="copy-btn" onclick="copyLink('https://zsign.s3.vn-hcm-1.vietnix.cloud/ipa/69d54260994f0_DV2-KHOI2500.ipa',this)">SAO CHÉP</div>
</div>

</div>
</div>

<div id="toast"></div>

</body>
</html>
