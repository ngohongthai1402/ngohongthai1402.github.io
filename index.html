<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#0f0f0f;
  color:white;
}

/* LOADING */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:#0f0f0f;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader-circle {
  width:60px;
  height:60px;
  border:6px solid #1c1c1e;
  border-top:6px solid #0a84ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}

/* Header */
header {
  text-align:center;
  font-size:22px;
  padding:15px;
  font-weight:bold;
}

/* Logo */
.logo {
  text-align:center;
}
.logo img {
  width:120px;
  border-radius:50%;
  box-shadow:0 0 25px #0a84ff;
}

/* Search */
.search {
  padding:10px;
}
.search input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1c1c1e;
  color:white;
}

/* Grid */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

/* Card */
.app {
  background:#1c1c1e;
  border-radius:20px;
  padding:15px;
  text-align:center;
  transition:0.3s;
}

.app:hover {
  transform:scale(1.05);
}

/* App icon */
.app img {
  width:70px;
  border-radius:15px;
}

/* Button */
.btn {
  display:inline-block;
  margin-top:10px;
  padding:10px 15px;
  background:#0a84ff;
  border-radius:12px;
  color:white;
  cursor:pointer;
}

/* Video */
.video {
  margin:20px;
  background:#1c1c1e;
  border-radius:15px;
  padding:10px;
}

iframe {
  width:100%;
  border-radius:10px;
}

/* Toast */
#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#0a84ff;
  padding:12px 20px;
  border-radius:12px;
  display:none;
}

/* Footer */
footer {
  text-align:center;
  padding:20px;
}
</style>

<script>
function searchApp() {
  let input = document.getElementById("search").value.toLowerCase();
  let apps = document.getElementsByClassName("app");

  for (let i = 0; i < apps.length; i++) {
    let name = apps[i].innerText.toLowerCase();
    apps[i].style.display = name.includes(input) ? "" : "none";
  }
}

function copyLink(link) {
  navigator.clipboard.writeText(link);
  let toast = document.getElementById("toast");
  toast.style.display = "block";
  setTimeout(() => { toast.style.display = "none"; }, 2000);
}

window.onload = function() {
  document.getElementById("loader").style.display = "none";
}
</script>
