<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED I AM NHT</title>

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
background:#0f0f0f;
color:white
}

/* HEADER */
header{
text-align:center;
padding:15px;
font-size:20px;
font-weight:700;
}

/* LOGO */
.logo{text-align:center}
.logo img{
width:120px;
border-radius:50%;
box-shadow:0 0 25px #0a84ff
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

/* MENU */
.menu-title{
font-size:18px;
font-weight:700;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.menu-content{
display:none;
margin-top:10px;
}

/* ITEM */
.app-item{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
background:#2c2c2e;
padding:15px;
border-radius:18px;
margin:12px 0;
}

/* LOGO GAME */
.app-item img{
width:60px;
height:60px;
border-radius:15px;
margin-bottom:10px;
box-shadow:0 0 20px #0a84ff;
}

/* TITLE */
.app-title{
font-size:17px;
font-weight:700;
margin-bottom:10px;
}

/* BUTTON COPY */
.copy-btn{
background:#0a84ff;
padding:12px;
border-radius:12px;
font-weight:600;
font-size:15px;
width:80%;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
box-shadow:0 0 15px #0a84ff;
cursor:pointer;
}

.copy-btn:active{
transform:scale(0.95);
}

/* ESIGN */
.esign-logo{
width:80px;
border-radius:15px;
margin-bottom:10px;
box-shadow:0 0 20px #0a84ff;
}

.esign-btn, .cert-btn{
display:flex;
justify-content:center;
align-items:center;
padding:14px;
border-radius:14px;
font-weight:700;
margin-top:10px;
background:#0a84ff;
box-shadow:0 0 15px #0a84ff;
cursor:pointer;
}

a{
text-decoration:none;
color:inherit;
}

/* DOT */
.dot{
width:10px;
height:10px;
background:#00ffcc;
border-radius:50%;
margin-left:8px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

/* VIDEO */
.video{
display:none;
margin-top:10px;
text-align:center;
}

.video iframe{
width:100%;
max-width:320px;
height:550px;
border-radius:15px;
}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#0a84ff;
padding:10px 20px;
border-radius:10px;
display:none;
}
</style>

<script>
function toggleMenu(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block"?"none":"block";
}

function copyLink(link){
navigator.clipboard.writeText(link);
showToast("✅ Đã sao chép!");
}

function showToast(text){
let t=document.getElementById("toast");
t.innerText=text;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

function showVideo(id){
let videos=document.getElementsByClassName("video");
for(let v of videos){v.style.display="none";}
document.getElementById(id).style.display="block";
}
</script>

</head>

<body>

<header>SPEED I AM NHT</header>

<div class="logo">

</div>

</div>

📋 Sao chép
</div>
</div>

<div class="app-item">

📋 Sao chép
</div>
</div>

<div class="app-item">
<img src="logogame.png">
<div class="app-title">SPEED IGG</div>
<div class="copy-btn" onclick="copyLink('https://zsign.s3.vn-hcm-1.vietnix.cloud/ipa/69d5415744fd8_IGG2500.ipa')">
📋 Sao chép
</div>
</div>

</div>
</div>

<!-- ESIGN -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu2')">
⚡ Xem Tải ESign ▼

</body>
</html>
