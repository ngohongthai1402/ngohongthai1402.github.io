<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED I AM NHT</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white
}

/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
padding:15px;
font-size:20px;
font-weight:700;
}

/* ===== TÍCH TELE XOAY ===== */
.tick{
width:18px;
height:18px;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}
.tick::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:#0a84ff;
clip-path:polygon(
50% 0%,65% 15%,85% 15%,90% 35%,
100% 50%,90% 65%,85% 85%,65% 85%,
50% 100%,35% 85%,15% 85%,10% 65%,
0% 50%,10% 35%,15% 15%,35% 15%
);
box-shadow:0 0 10px #0a84ff;
animation:spin 3s linear infinite;
}
.tick::after{
content:"✔";
color:#fff;
font-size:10px;
z-index:1;
}
@keyframes spin{
100%{transform:rotate(360deg);}
}

/* LOGO */
.logo{text-align:center}
.logo img{
width:120px;
border-radius:50%;
box-shadow:0 0 25px #0a84ff
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

/* MENU */
.menu-title{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
font-weight:700;
}

/* ICON XOAY */
.arrow{
transition:0.3s;
}
.arrow.rotate{
transform:rotate(180deg);
}

/* MENU ANIMATION */
.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.4s;
}
.menu-content.open{
max-height:1200px;
opacity:1;
margin-top:10px;
}

/* DOT MENU */
.menu-dot{
width:10px;height:10px;
background:#0a84ff;
border-radius:50%;
box-shadow:0 0 10px #0a84ff;
animation:blink 1s infinite;
}
@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

/* SPEED */
.app-item{
display:flex;
flex-direction:column;
align-items:center;
background:#2c2c2e;
padding:15px;
border-radius:18px;
margin:12px 0;
}
.app-item img{
width:60px;
border-radius:15px;
margin-bottom:10px;
box-shadow:0 0 15px #0a84ff;
}
.app-title{font-weight:700;margin-bottom:10px}

/* COPY */
.copy-btn{
background:#0a84ff;
box-shadow:0 0 15px #0a84ff;
padding:12px;
border-radius:12px;
width:80%;
text-align:center;
cursor:pointer;
position:relative;
overflow:hidden;
}

/* ripple */
.copy-btn::after{
content:"";
position:absolute;
width:10px;height:10px;
background:rgba(255,255,255,0.5);
border-radius:50%;
transform:scale(0);
}
.copy-btn.ripple::after{
animation:ripple 0.6s;
}
@keyframes ripple{
0%{transform:scale(0);opacity:1;}
100%{transform:scale(20);opacity:0;}
}

/* ESIGN */
.esign-logo{
width:90px;
border-radius:20px;
margin:10px auto;
display:block;
box-shadow:0 0 25px #0a84ff;
}

.esign-btn,.cert-btn{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
background:#0a84ff;
padding:14px;
border-radius:14px;
margin-top:10px;
font-weight:700;
box-shadow:0 0 15px #0a84ff;
cursor:pointer;
}

/* ICON XOAY CHO CÀI ĐẶT */
.dot{
width:12px;
height:12px;
background:#0a84ff;
clip-path:polygon(
50% 0%,65% 15%,85% 15%,90% 35%,
100% 50%,90% 65%,85% 85%,65% 85%,
50% 100%,35% 85%,15% 85%,10% 65%,
0% 50%,10% 35%,15% 15%,35% 15%
);
box-shadow:0 0 10px #0a84ff;
animation:spin 2s linear infinite, blink 1s infinite;
}

/* TOAST */
#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:12px 20px;
border-radius:14px;
opacity:0;
transition:0.3s;
}
#toast.show{opacity:1;}
</style>

<script>
function toggleMenu(id,arrow){
document.getElementById(id).classList.toggle("open");
arrow.classList.toggle("rotate");
}

/* COPY */
function copyLink(link,btn){
navigator.clipboard.writeText(link);

btn.classList.add("ripple");
setTimeout(()=>btn.classList.remove("ripple"),600);

let t=document.getElementById("toast");
t.innerHTML="✔ Đã sao chép link";
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}
</script>

</head>

<body>

</div>

</div>

<div class="app-item">

</div>

</div>
</div>

<!-- ESIGN -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('menu2',this.querySelector('.arrow'))">
<span style="display:flex;align-items:center;gap:6px;">
ESIGN AXITAT <span class="menu-dot"></span>
</span>
<span class="arrow">▼</span>
</div>

<div id="menu2" class="menu-content" style="text-align:center;">

onclick="window.location.href='itms-services://?action=download-manifest&url=https://ngohongthai1402.github.io/esign.plist'">

</div>

</html>
