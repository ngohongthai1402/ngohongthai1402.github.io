@keyframes glowGame{

100%{box-shadow:0 0 25px #0a84ff;}
}

.app-info{
flex:1;
display:flex;

/* BUTTON */
.btn{
display:inline-flex;

justify-content:center;
padding:10px;
border-radius:10px;
background:#0a84ff;
color:white;
cursor:pointer;
width:100%;

}

.btn.active{
background:#34c759;
box-shadow:0 0 15px #34c759;
}

.green{background:#34c759}
.blue{background:#0a84ff}

.btn:active{transform:scale(0.95)}

/* VIDEO */
.video{
display:none;
margin-top:10px;
text-align:center;
animation:fadeIn 0.25s ease;
}

.video iframe{
width:100%;
max-width:320px;
height:550px;
border-radius:15px;
}

/* GLOW VIDEO */
.v1 iframe{box-shadow:0 0 20px #0a84ff;}
.v2 iframe{box-shadow:0 0 20px #34c759;}
.v3 iframe{box-shadow:0 0 20px #ff9f0a;}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.95);}
to{opacity:1; transform:scale(1);}
}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#0a84ff;
padding:10px 20px;
border-radius:10px;
display:none;
}
</style>

<script>
function toggleMenu(id, el){
let content=document.getElementById(id);
let arrow=el.querySelector(".arrow");

if(content.style.display==="block"){
content.style.display="none";
arrow.classList.remove("rotate");
}else{
content.style.display="block";
arrow.classList.add("rotate");
}
}

function copyLink(link){
navigator.clipboard.writeText(link);
showToast("✅ Đã sao chép!");
}

function showToast(text){
let t=document.getElementById("toast");
t.innerText=text;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* VIDEO PRO */
function showVideo(id,btn){

let videos=document.getElementsByClassName("video");
let buttons=document.querySelectorAll("#menu3 .btn");

/* reset */
for(let i=0;i<videos.length;i++){
videos[i].style.display="none";
}
buttons.forEach(b=>b.classList.remove("active"));

/* show */
document.getElementById(id).style.display="block";
btn.classList.add("active");

document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* VIP */
function checkPass(btn){
let pass=prompt("🔒 Nhập mật khẩu:");
if(pass==="1402"){
showVideo("v3",btn);
}else{
alert("❌ Sai mật khẩu!");
}
}
