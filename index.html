<style>
body{margin:0;font-family:-apple-system;background:#0f0f0f;color:white}

/* LOADING */
#loader{position:fixed;width:100%;height:100%;background:#0f0f0f;display:flex;justify-content:center;align-items:center;z-index:9999}
.loader{width:60px;height:60px;border:6px solid #1c1c1e;border-top:6px solid #0a84ff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}

/* HEADER */
header{text-align:center;padding:15px;font-size:22px;font-weight:bold}

/* LOGO */
.logo{text-align:center}
.logo img{width:120px;border-radius:50%;box-shadow:0 0 25px #0a84ff}

/* SEARCH */
.search{padding:10px}
.search input{width:100%;padding:10px;border-radius:10px;border:none;background:#1c1c1e;color:white}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:15px}

/* CARD */
.app{background:#1c1c1e;border-radius:20px;padding:15px;text-align:center;transition:0.3s}
.app:hover{transform:scale(1.05)}
.app img{width:70px;border-radius:15px}

/* BUTTON */
.btn{margin:10px;padding:10px 15px;background:#0a84ff;border-radius:12px;color:white;cursor:pointer}

/* ESIGN */
.esign-box{margin:20px;padding:20px;background:#1c1c1e;border-radius:20px;text-align:center;box-shadow:0 0 20px rgba(0,0,0,0.5)}

/* VIDEO */
.video{display:none;text-align:center;margin:15px}
.video iframe{width:100%;max-width:320px;height:550px;border-radius:20px}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0a84ff;padding:12px 20px;border-radius:12px;display:none}

/* FOOTER */
footer{text-align:center;padding:20px}
.zalo-btn{
display:inline-block;
background:#0a84ff;
padding:12px 20px;
border-radius:12px;
color:white;
text-decoration:none;
box-shadow:0 0 15px #0a84ff;
}
</style>

<script>
function searchApp(){
let input=document.getElementById("search").value.toLowerCase();
let apps=document.getElementsByClassName("app");
for(let i=0;i<apps.length;i++){
let name=apps[i].innerText.toLowerCase();
apps[i].style.display=name.includes(input)?"":"none";
}
}

function copyLink(link){
navigator.clipboard.writeText(link);
showToast("✅ Đã sao chép link!");
}

function showToast(text){
let toast=document.getElementById("toast");
toast.innerText=text;
toast.style.display="block";
setTimeout(()=>{toast.style.display="none"},2000);
}

function toggleVideo(id){
let videos=document.getElementsByClassName("video");
for(let i=0;i<videos.length;i++){
videos[i].style.display="none";
}
document.getElementById(id).style.display="block";
}

window.onload=function(){
document.getElementById("loader").style.display="none";
}
</script>
