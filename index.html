/* LOADING */
#loader{position:fixed;width:100%;height:100%;background:#0f0f0f;display:flex;justify-content:center;align-items:center;z-index:9999}
.loader{width:60px;height:60px;border:6px solid #1c1c1e;border-top:6px solid #0a84ff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}

/* HEADER */

/* LOGO */

/* MENU */

font-weight:bold;
cursor:pointer;
text-align:center;
}

.menu-content{
display:none;
margin-top:10px;
animation:fade 0.3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(-5px)}
to{opacity:1;transform:translateY(0)}
}

/* BUTTON */
.btn, .btn-lock{
display:inline-flex;
align-items:center;
justify-content:center;
gap:8px;
margin:8px;
padding:12px 20px;
border-radius:15px;
color:white;
cursor:pointer;
border:none;
}

.blue{background:#0a84ff;box-shadow:0 0 15px #0a84ff;}
.green{background:#34c759;box-shadow:0 0 15px #34c759;}

/* DOT */
.dot{
width:10px;height:10px;background:#00ff88;border-radius:50%;
box-shadow:0 0 10px #00ff88;
animation:blink 1.2s infinite;
}
@keyframes blink{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

/* VIDEO */
.video{
display:none;
opacity:0;
transition:0.3s;
text-align:center;
margin:10px;
}
.video.show{
display:block;
opacity:1;
}

iframe{
width:100%;
max-width:320px;
height:550px;
border-radius:20px;
}

/* FOOTER */
footer{text-align:center;padding:20px}
.zalo-btn{
display:inline-block;
background:#0a84ff;
padding:12px 20px;
border-radius:12px;
color:white;
text-decoration:none;
}
</style>

<script>
function toggleMenu(id, el){
let m=document.getElementById(id);
if(m.style.display==="block"){
m.style.display="none";
el.innerHTML=el.innerHTML.replace("▲","▼");
}else{
m.style.display="block";
el.innerHTML=el.innerHTML.replace("▼","▲");
}
}

/* VIDEO VIP */
let currentVideo=null;

function playVideo(id, videoId){
if(currentVideo){
currentVideo.innerHTML="";
currentVideo.classList.remove("show");
}
let container=document.getElementById(id);
container.innerHTML=`<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1"></iframe>`;
container.classList.add("show");
container.scrollIntoView({behavior:"smooth"});
currentVideo=container;
}

}

window.onload=function(){
document.getElementById("loader").style.display="none";
