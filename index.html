<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED I AM NHT</title>

<style>
*{box-sizing:border-box;transition:0.3s}

body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white
}

/* LIGHT MODE */
body.light{
background:#f2f2f7;
color:#000;
}
body.light .box{background:#fff;}
body.light .app-item{background:#eee;}
body.light .video-btn{background:#ddd;}

/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
padding:15px;
font-size:20px;
font-weight:700;
position:relative;
background:transparent;
}

/* DARK BUTTON */
.toggle-theme{
position:absolute;
right:15px;
top:12px;
background:#0a84ff;
padding:8px 12px;
border-radius:12px;
cursor:pointer;
box-shadow:0 0 10px #0a84ff;
}

/* TICK XANH */
.tick{
width:18px;height:18px;
position:relative;
display:inline-flex;
align-items:center;
justify-content:center;
margin-left:6px;
}
.tick::before{
content:"";
position:absolute;
width:100%;height:100%;
background:#0a84ff;
clip-path:polygon(50% 0%,65% 15%,85% 15%,90% 35%,100% 50%,90% 65%,85% 85%,65% 85%,50% 100%,35% 85%,15% 85%,10% 65%,0% 50%,10% 35%,15% 15%,35% 15%);
animation:spin 3s linear infinite;
box-shadow:0 0 10px #0a84ff;
}
.tick::after{
content:"✔";
font-size:10px;
z-index:1;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* LOGO */
.logo{text-align:center;margin-top:10px;}
.logo img{
width:150px;
height:150px;
object-fit:contain;
background:#000;
border-radius:50%;
box-shadow:0 0 25px #0a84ff;
padding:5px;
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

/* MENU */
.menu-title{
display:flex;
justify-content:space-between;
cursor:pointer;
font-weight:700;
}

.menu-content{
max-height:0;
overflow:hidden;
opacity:0;
transition:0.4s;
}
.menu-content.open{
max-height:1200px;
opacity:1;
margin-top:10px;
}

/* APP */
.app-item{
display:flex;
flex-direction:column;
align-items:center;
background:#2c2c2e;
padding:15px;
border-radius:18px;
margin:12px 0;
}

.copy-btn{
background:#0a84ff;
padding:12px;
border-radius:12px;
width:100%;
text-align:center;
margin-top:10px;
cursor:pointer;
}

/* ESIGN */
.esign-btn,.cert-btn{
background:#0a84ff;
padding:14px;
border-radius:14px;
margin-top:10px;
cursor:pointer;
font-weight:700;
}

/* DOT ONLINE */
.live-dot{
width:10px;height:10px;
background:#00ffcc;
border-radius:50%;
display:inline-block;
margin-left:6px;
animation:blink 1s infinite;
}
@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
margin:20px;
background:#1c1c1e;
border-radius:20px;
}

.counter{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:10px;
}

.badge{
background:#2c2c2e;
padding:10px 15px;
border-radius:12px;
}

body.light .footer{background:#fff;}
body.light .badge{background:#ddd;}
</style>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDcmYnUovHHHBWFATXuLG3o4oGcnLKhwnQ",
authDomain: "iamnht.firebaseapp.com",
databaseURL: "https://iamnht-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "iamnht",
storageBucket: "iamnht.firebasestorage.app",
messagingSenderId: "359554660567",
appId: "1:359554660567:web:84c9b72e079067e6ef1892"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ONLINE */
const userRef = ref(db, "online/" + Date.now());
set(userRef, true);
onDisconnect(userRef).remove();

onValue(ref(db, "online"), snap=>{
document.getElementById("online").innerText = snap.size || 0;
});

/* DNS COUNT */
const dnsRef = ref(db, "dns");

window.downloadDNS = async function(){
let snap = await get(dnsRef);
let count = snap.val() || 0;
set(dnsRef, count + 1);

window.location.href="https://raw.githubusercontent.com/ngohongthai1402/dns/ngohongthai/dns.mobileconfig";
}

onValue(dnsRef, snap=>{
document.getElementById("dns").innerText = snap.val() || 0;
});
</script>

<script>
function toggleMenu(id){
document.getElementById(id).classList.toggle("open");
}

function toggleTheme(){
document.body.classList.toggle("light");
}
</script>

</head>

<body>

<header>
<span>Ngô Hồng Thái</span>
<span class="tick"></span>

<div class="toggle-theme" onclick="toggleTheme()">🌙</div>
</header>

<div class="logo">
<img src="logo3.png">
</div>

<!-- SPEED -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('m1')">
DANH SÁCH SPEED ▼
</div>

<div id="m1" class="menu-content">
<div class="app-item">
ĐẾM VÒNG V1
<div class="copy-btn">SAO CHÉP</div>
</div>
</div>
</div>

<!-- DNS -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('m2')">
DNS CHẶN THU HỒI ▼
</div>

<div id="m2" class="menu-content">
<div class="copy-btn" onclick="downloadDNS()">TẢI NHT DNS 🔫</div>
</div>
</div>

<!-- ESIGN -->
<div class="box">
<div class="menu-title" onclick="toggleMenu('m3')">
ESIGN AXITAT 🔥 <span class="live-dot"></span>
</div>

<div id="m3" class="menu-content">
<div class="esign-btn">CÀI ESIGN</div>
<div class="cert-btn">TẢI CHỨNG CHỈ</div>
</div>
</div>

<!-- FOOTER -->
<div class="footer">
<div class="counter">
<div class="badge">👥 Online: <span id="online">0</span></div>
<div class="badge">📥 DNS: <span id="dns">0</span></div>
</div>

<div>Ngô Hồng Thái đang tập làm web lỏ 😆</div>
</div>

</body>
</html>
