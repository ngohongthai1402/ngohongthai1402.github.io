<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white
}

/* HEADER */
header{
text-align:center;
padding:15px;
font-size:20px;
font-weight:700;
}

/* LOGO */
.logo{text-align:center}
.logo img{
width:120px;
border-radius:50%;
box-shadow:0 0 25px #0a84ff
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

/* MENU */
.menu-title{
font-size:18px;
font-weight:700;
display:flex;
justify-content:space-between;
cursor:pointer;
align-items:center;
}
.menu-content{display:none;margin-top:10px}

/* DOT MENU */
.menu-dot{
width:10px;height:10px;
background:#0a84ff;
border-radius:50%;
margin-left:6px;
box-shadow:0 0 10px #0a84ff;
animation:blink 1s infinite;
}
@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

/* APP */
.app-item{
display:flex;
flex-direction:column;
align-items:center;
background:#2c2c2e;
padding:15px;
border-radius:18px;
margin:12px 0;
}
.app-item img{
width:70px;
border-radius:18px;
margin-bottom:10px;
box-shadow:0 0 20px #0a84ff;
}
.app-title{
font-weight:700;
margin-bottom:10px;
}

/* NÚT CHUNG */
.main-btn{
background:#0a84ff;
padding:14px;
border-radius:14px;
width:80%;
text-align:center;
font-weight:700;
cursor:pointer;
box-shadow:0 0 20px #0a84ff;
position:relative;
overflow:hidden;
transition:0.2s;
}

.main-btn:active{
transform:scale(0.95);
}

/* ripple */
.main-btn::after{
content:"";
position:absolute;
width:10px;height:10px;
background:rgba(255,255,255,0.5);
border-radius:50%;
transform:scale(0);
}
.main-btn.ripple::after{
animation:ripple 0.6s;
}
@keyframes ripple{
0%{transform:scale(0);opacity:1}
100%{transform:scale(20);opacity:0}
}

/* ===== FIX LOGO ESIGN ===== */
.esign-logo{
width:90px;
height:90px;
object-fit:cover;
border-radius:20px;
margin:10px auto;
display:block;
box-shadow:0 0 25px #0a84ff;
background:#2c2c2e;
}

/* DOT */
.dot{
width:10px;height:10px;
background:#00ffcc;
border-radius:50%;
box-shadow:0 0 10px #00ffcc;
animation:blink 1s infinite;
}

/* TOAST */
#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:12px 20px;
border-radius:14px;
opacity:0;
transition:0.3s;
}
#toast.show{opacity:1;}
</style>

<script>
function toggleMenu(id){
let el=document.getElementById(id);
el.style.display=el.style.display==="block"?"none":"block";
}

function copyLink(link,btn){
navigator.clipboard.writeText(link);

btn.classList.add("ripple");
setTimeout(()=>btn.classList.remove("ripple"),600);

let t=document.getElementById("toast");
t.innerHTML="✔ Đã sao chép link";
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}
</script>

</head>
