<style>
body{
margin:0;
font-family:-apple-system;
background:#0f0f0f;
color:white
}

/* HEADER */
header{
text-align:center;
padding:15px;
font-size:20px;
font-weight:700;
}

/* LOGO */
.logo{text-align:center}
.logo img{
width:120px;
border-radius:50%;
box-shadow:0 0 25px #0a84ff
}

/* BOX */
.box{
margin:15px;
background:#1c1c1e;
border-radius:20px;
padding:15px;
}

/* MENU */
.menu-title{
font-size:18px;
font-weight:700;
display:flex;
justify-content:space-between;
cursor:pointer;
}
.menu-content{display:none;margin-top:10px}

/* DOT MENU */
.menu-dot{
width:10px;height:10px;
background:#00ffcc;
border-radius:50%;
margin-left:6px;
animation:blink 1s infinite;
}
@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

/* APP */
.app-item{
display:flex;
flex-direction:column;
align-items:center;
background:#2c2c2e;
padding:15px;
border-radius:18px;
margin:12px 0;
}
.app-item img{
width:60px;
border-radius:15px;
margin-bottom:10px;
box-shadow:0 0 20px #0a84ff;
}
.app-title{
font-weight:700;
margin-bottom:10px;
}

/* COPY */
.copy-btn{
background:#0a84ff;
padding:12px;
border-radius:12px;
width:80%;
text-align:center;
cursor:pointer;
position:relative;
overflow:hidden;
}

/* RIPPLE */
.copy-btn::after{
content:"";
position:absolute;
width:10px;height:10px;
background:rgba(255,255,255,0.5);
border-radius:50%;
transform:scale(0);
opacity:0;
}
.copy-btn.ripple::after{
animation:ripple 0.6s ease;
}
@keyframes ripple{
0%{transform:scale(0);opacity:0.8;}
100%{transform:scale(20);opacity:0;}
}

/* ESIGN */
.esign-logo{
width:80px;
border-radius:15px;
margin-bottom:10px;
box-shadow:0 0 20px #0a84ff;
}
.esign-btn,.cert-btn{
background:#0a84ff;
padding:14px;
border-radius:14px;
margin-top:10px;
font-weight:700;
cursor:pointer;
text-align:center;
}

/* DOT */
.dot{
width:10px;height:10px;
background:#00ffcc;
border-radius:50%;
margin-left:6px;
animation:blink 1s infinite;
}

/* VIDEO BUTTON */
.video-btn{
display:flex;
align-items:center;
gap:10px;
padding:14px;
border-radius:14px;
margin-top:10px;
font-weight:700;
cursor:pointer;
background:#2c2c2e;
}

.video-btn.active{
background:#0a84ff;
box-shadow:0 0 15px #0a84ff;
}

/* ICON */
.video-icon{
width:20px;
text-align:center;
}

/* VIDEO */
.video{
display:none;
margin-top:10px;
text-align:center;
animation:fade 0.3s;
}
.video iframe{
width:100%;
max-width:320px;
height:550px;
border-radius:15px;
}
@keyframes fade{
from{opacity:0;transform:scale(0.95)}
to{opacity:1;transform:scale(1)}
}

/* TOAST */
#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%) translateY(20px);
background:rgba(20,20,20,0.95);
padding:12px 20px;
border-radius:14px;
font-weight:600;
opacity:0;
transition:0.35s;
}
#toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}
</style>

<script>
let currentVideo=null;

function toggleMenu(id){
let el=document.getElementById(id);
el.style.display=el.style.display==="block"?"none":"block";
}

/* COPY */
function copyLink(link,btn){
navigator.clipboard.writeText(link);

btn.classList.add("ripple");
setTimeout(()=>btn.classList.remove("ripple"),600);

let t=document.getElementById("toast");
t.innerHTML="✔ Đã sao chép link";
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

/* VIDEO PRO */
function toggleVideo(id,btn){

let videos=document.querySelectorAll(".video");
let buttons=document.querySelectorAll(".video-btn");

/* click lại = tắt */
if(currentVideo===id){
document.getElementById(id).style.display="none";
btn.classList.remove("active");
btn.querySelector(".video-icon").innerHTML="▶";
currentVideo=null;
return;
}

/* tắt hết */
videos.forEach(v=>v.style.display="none");
buttons.forEach(b=>{
b.classList.remove("active");
b.querySelector(".video-icon").innerHTML="▶";
});

/* mở */
document.getElementById(id).style.display="block";
btn.classList.add("active");
btn.querySelector(".video-icon").innerHTML="⏸";

currentVideo=id;
}
</script>
