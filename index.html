<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ngô Hồng Thái</title>

<style>
/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system, BlinkMacSystemFont;
}

/* ===== BACKGROUND ===== */
body{
  background:#000;
  color:#fff;
}

/* ===== GLASS NAVBAR (iOS 17) ===== */
.navbar{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  padding:12px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:999;
}

/* ===== MENU SCROLL NGANG ===== */
.menu{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.menu button{
  border:none;
  padding:8px 14px;
  border-radius:12px;
  background:#1c1c1e;
  color:#fff;
  white-space:nowrap;
}

/* ===== DARK/LIGHT BUTTON ===== */
.toggle{
  background:#1c1c1e;
  padding:8px 12px;
  border-radius:12px;
  cursor:pointer;
}

/* ===== HEADER ===== */
.header{
  text-align:center;
  margin-top:110px;
}

.name{
  font-size:22px;
  font-weight:bold;
}

.verify{
  color:#0a84ff;
}

/* ===== AVATAR ===== */
.avatar{
  width:170px;
  height:170px;
  border-radius:50%;
  margin:20px auto;
  overflow:hidden;
  box-shadow:0 0 25px #0a84ff;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.25); /* zoom mặt */
}

/* ===== BOX ===== */
.box{
  width:90%;
  margin:12px auto;
  padding:18px;
  border-radius:20px;
  background:#1c1c1e;
}

/* ===== STATUS DOT ===== */
.status{
  width:10px;
  height:10px;
  background:#00ff88;
  border-radius:50%;
  display:inline-block;
  margin-left:10px;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1}
  50%{opacity:0.3}
  100%{opacity:1}
}

/* ===== FOOTER ===== */
.footer{
  margin:20px;
  text-align:center;
}

.counter{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:10px;
}

.card{
  background:#1c1c1e;
  padding:10px 15px;
  border-radius:12px;
}

/* ===== LIGHT MODE ===== */
.light{
  background:#fff;
  color:#000;
}

.light .navbar{
  background:rgba(255,255,255,0.7);
}

.light .box,
.light .card,
.light .menu button{
  background:#eee;
  color:#000;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="menu">
    <button>DNS</button>
    <button>ESIGN</button>
    <button>IPA</button>
    <button>UDID</button>
  </div>

  <div>
    <span id="online">0</span> 👥
    <span class="toggle" onclick="toggleMode()">🌙</span>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="name">
    Ngô Hồng Thái <span class="verify">✔</span>
  </div>

  <div class="avatar">
    <img src="logo.png">
  </div>
</div>

<!-- MENU BOX -->
<div class="box">DANH SÁCH SPEED</div>
<div class="box">DNS CHẶN THU HỒI</div>
<div class="box">
  ESIGN AXITAT 🔥 <span class="status"></span>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="counter">
    <div class="card">Online: <span id="online2">0</span></div>
    <div class="card">DNS: <span id="dns">0</span></div>
  </div>

  <div>Ngô Hồng Thái đang tập làm web lỏ 😆</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDcmYnUovHHHBWFATXuLG3o4oGcnLKhwnQ",
  authDomain: "iamnht.firebaseapp.com",
  databaseURL: "https://iamnht-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "iamnht",
  storageBucket: "iamnht.firebasestorage.app",
  messagingSenderId: "359554660567",
  appId: "1:359554660567:web:84c9b72e079067e6ef1892"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===== ONLINE REALTIME ===== */
const userRef = ref(db, "online/" + Date.now());
set(userRef, true);
onDisconnect(userRef).remove();

onValue(ref(db, "online"), snap => {
  const count = snap.size || 0;
  document.getElementById("online").innerText = count;
  document.getElementById("online2").innerText = count;
});

/* ===== COUNT DNS ===== */
onValue(ref(db, "dns"), snap => {
  document.getElementById("dns").innerText = snap.val() || 0;
});

/* CLICK TĂNG DNS */
window.tangDNS = function(){
  const dnsRef = ref(db,"dns");
  onValue(dnsRef, snap=>{
    let val = snap.val() || 0;
    set(dnsRef, val + 1);
  }, {onlyOnce:true});
}
</script>

<!-- DARK MODE -->
<script>
function toggleMode(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
