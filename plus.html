<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I AM NHT</title>

<style>

/* ===== IOS SYSTEM DARK ===== */
:root{
  --bg-main:#1c1c1e;
  --bg-card:#2c2c2e;
  --divider:#3a3a3c;

  --text-main:#fff;
  --text-sub:#8e8e93;

  --btn-bg:#fff;
  --btn-text:#000;
}

/* ===== BASE ===== */
body{
  margin:0;
  font-family:-apple-system;
  background:var(--bg-main);
  color:var(--text-main);
  overflow-x:hidden;
}

/* ===== LIGHTNING EFFECT ===== */
.lightning{
  position:fixed;
  width:100px;
  height:100px;
  pointer-events:none;
  z-index:999;
  background:radial-gradient(circle, #00ffff 0%, transparent 70%);
  animation:flash 0.3s ease;
}

@keyframes flash{
  0%{opacity:1; transform:scale(0.5);}
  100%{opacity:0; transform:scale(2);}
}

/* ===== HEADER ===== */
.header{
  position:sticky;
  top:0;
  padding:20px 16px 10px;
  backdrop-filter:blur(20px);
  background:rgba(28,28,30,0.7);
}

.title{
  font-size:28px;
  font-weight:700;
}

.sub{
  font-size:13px;
  color:var(--text-sub);
}

/* ===== VIDEO ===== */
.feature{
  margin:0 16px;
  border-radius:20px;
  overflow:hidden;
}

.feature video{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* ===== APP ===== */
.app{
  display:flex;
  align-items:center;
  padding:14px 16px;
  border-bottom:1px solid var(--divider);
}

.icon{
  width:50px;
  height:50px;
  border-radius:12px;
  margin-right:12px;
}

.info{flex:1;}

.name{font-weight:600;}
.desc{font-size:12px;color:var(--text-sub);}

/* ===== BUTTON ===== */
.get{
  background:#fff;
  color:#000;
  padding:6px 16px;
  border-radius:999px;
}

/* TAP */
.get:active,.app:active{
  transform:scale(0.96);
  opacity:0.7;
  transition:0.1s;
}

/* ===== COPY ===== */
.copy{
  margin:20px;
  background:#2c2c2e;
  padding:15px;
  border-radius:14px;
}
.copy-btn{
  margin-top:10px;
  background:#30d158;
  padding:10px;
  text-align:center;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">🚀 I AM NHT</div>
  <div class="sub">Kho IPA</div>
</div>

<div class="feature">
  <video autoplay muted loop playsinline>
    <source src="video.mp4">
  </video>
</div>

<div class="app" onclick="boom(event)">
  <img class="icon" src="https://via.placeholder.com/100">
  <div class="info">
    <div class="name">Speed IGG</div>
    <div class="desc">v3.5</div>
  </div>
  <div class="get" onclick="install(event,'LINK')">Nhận</div>
</div>

<div class="copy">
  link download
  <div class="copy-btn" onclick="boom(event)">Sao chép</div>
</div>

<script>

/* LIGHTNING EFFECT */
function boom(e){
  const x = e.clientX;
  const y = e.clientY;

  const div = document.createElement("div");
  div.className="lightning";
  div.style.left = x-50+"px";
  div.style.top = y-50+"px";

  document.body.appendChild(div);

  setTimeout(()=>div.remove(),300);
}

/* INSTALL */
function install(e,url){
  e.stopPropagation();
  boom(e);
  window.open(url,"_blank");
}

</script>

</body>
</html>
