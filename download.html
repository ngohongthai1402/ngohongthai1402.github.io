<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TẢI CẬP NHẬT SPEED - I AM NHT</title>

<style>

/* ===== TEXT EFFECT ===== */
.effect{
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
  letter-spacing:2px;

  background:linear-gradient(
    270deg,
    #ff0000,#ff7300,#fffb00,#48ff00,
    #00ffd5,#002bff,#7a00ff,#ff00c8,#ff0000
  );
  background-size:800% 800%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:rainbowMove 6s linear infinite, glowPulse 1.5s infinite;
}
@keyframes rainbowMove{
  0%{background-position:0%}
  100%{background-position:100%}
}
@keyframes glowPulse{
  0%,100%{filter:drop-shadow(0 0 5px #00ffff);}
  50%{filter:drop-shadow(0 0 15px #00ffff);}
}

/* ===== BODY ===== */
body{
  margin:0;
  background:#000;
  font-family:-apple-system;
  color:#fff;
}

/* ===== VIDEO ===== */
.story-wrap{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  height:100vh;
}
.story{
  min-width:100%;
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}
.story iframe{
  position:absolute;
  top:50%;
  left:50%;
  width:177.77vh;
  height:100vh;
  transform:translate(-50%, -50%);
  border:none;
}

/* ===== CONTROL ===== */
.replay-btn,.sound-btn,.play-btn{
  position:absolute;
  bottom:80px;
  width:45px;
  height:45px;
  border-radius:50%;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 10px #0ff;
}
.replay-btn{ right:20px; }
.sound-btn{ right:75px; }
.play-btn{ right:130px; }

/* ===== MENU ===== */
.main-ui{
  background:#0f0f0f;
  padding:20px;
  text-align:center;
}
.btn{
  padding:18px;
  border-radius:18px;
  margin:15px 0;
  font-weight:bold;
  cursor:pointer;
}
.igg{background:#0a84ff;}
.dv{background:#ff5722;}
.plus{background:gold;color:#000;}

.loading{opacity:0;color:#0ff;}
.loading.show{opacity:1;}

.swipe-tip{
  margin-top:10px;
  color:#00ffcc;
  animation:blink 1.5s infinite;
}
@keyframes blink{
  0%,100%{opacity:0.5;}
  50%{opacity:1;}
}

.note{
  margin-top:15px;
  font-size:13px;
}

/* ===== COPY MENU ===== */
.copy-menu{
  margin:15px;
  padding:12px;
  background:#111;
  border-radius:16px;
}
.copy-link{
  font-size:12px;
  color:#aaa;
  word-break:break-all;
  margin-bottom:10px;
}
.copy-btn{
  padding:12px;
  border-radius:12px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  font-weight:bold;
  cursor:pointer;
  text-align:center;
}
.copy-btn.copied{
  background:#00c853;
}

</style>
</head>

<body>

<div class="effect">Speed I AM NHT 🔫</div>

<!-- MENU -->
<div class="main-ui">

  <div class="btn igg" onclick="install('https://zsign.s3.vn-hcm-1.vietnix.cloud/ipa/69d5415744fd8_IGG2500.ipa.ipa')">🔵 TẢI SPEED IGG</div>
  <div class="btn dv" onclick="install('https://zsign.s3.vn-hcm-1.vietnix.cloud/ipa/69d541a1e17ae_DV12500.ipa')">🟠 TẢI ĐẾM VÒNG V1</div>
  <div class="btn dv" onclick="install('https://zsign.s3.vn-hcm-1.vietnix.cloud/ipa/69d54260994f0_DV2-KHOI2500.ipa')">🟠 TẢI ĐẾM VÒNG V2</div>
  <div class="btn plus" onclick="install('https://zsign.s3.vn-hcm-1.vietnix.cloud/ipa/69d542c82b34c_Plus2500.ipa')">👑 TẢI SPEED PLUS</div>

  <div id="loading" class="loading">📥 Đang tải xuống...</div>

  <div class="swipe-tip">⬆️ Vuốt lên để xem video hướng dẫn</div>

  <div class="note">
    👉 Mở ESIGN → vào mục tải xuống →URL dán link tải👇
<!-- COPY -->
  <div class="copy-link" id="linkText">
    https://ngohongthai1402.github.io/download
  </div>
  <div class="copy-btn" onclick="copyLink()">SAO CHÉP LINK</div>
</div>

<!-- VIDEO -->
<div class="story-wrap">
  <div class="story">

    <iframe data-src="https://www.youtube.com/embed/e74h1eb3b0c?enablejsapi=1&playsinline=1"></iframe>

    <div class="replay-btn" onclick="replayVideo(this)">🔄</div>
    <div class="sound-btn" onclick="toggleSound(this)">🔇</div>
    <div class="play-btn" onclick="togglePlay(this)">⏸</div>

  </div>
</div>

<script>

/* CHO PHÉP ÂM SAU KHI CHẠM */
let allowSound = false;
document.addEventListener("click", ()=>{ allowSound = true });

/* INSTALL */
function install(url){
  document.getElementById("loading").classList.add("show");
  setTimeout(()=>{ window.location.href = url; },1000);
}

/* COPY */
function copyLink(){
  const text = document.getElementById("linkText").innerText;
  navigator.clipboard.writeText(text);

  const btn = document.querySelector(".copy-btn");
  btn.innerText = "✅ ĐÃ SAO CHÉP";
  btn.classList.add("copied");

  setTimeout(()=>{
    btn.innerText = "📋 SAO CHÉP LINK";
    btn.classList.remove("copied");
  },2000);
}

/* REPLAY */
function replayVideo(btn){
  const iframe = btn.closest(".story").querySelector("iframe");
  iframe.contentWindow.postMessage('{"event":"command","func":"seekTo","args":[0,true]}','*');
  iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}','*');
}

/* SOUND */
function toggleSound(btn){
  const iframe = btn.closest(".story").querySelector("iframe");

  if(btn.classList.contains("on")){
    iframe.contentWindow.postMessage('{"event":"command","func":"mute","args":""}','*');
    btn.innerText="🔇";
    btn.classList.remove("on");
  }else{
    iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}','*');
    btn.innerText="🔊";
    btn.classList.add("on");
  }
}

/* PLAY */
function togglePlay(btn){
  const iframe = btn.closest(".story").querySelector("iframe");

  if(btn.classList.contains("pause")){
    iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}','*');
    btn.innerText="⏸";
    btn.classList.remove("pause");
  }else{
    iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}','*');
    btn.innerText="▶️";
    btn.classList.add("pause");
  }
}

/* AUTO PLAY + AUTO SOUND */
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    const iframe = entry.target.querySelector("iframe");

    if(entry.isIntersecting){
      if(!iframe.src){
        iframe.src = iframe.dataset.src + "&autoplay=1&mute=1";
      }else{
        iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}','*');
      }

      if(allowSound){
        setTimeout(()=>{
          iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}','*');
        },400);
      }

    }else{
      iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}','*');
    }
  });
},{threshold:0.7});

document.querySelectorAll(".story").forEach(el=>observer.observe(el));

</script>

</body>
</html>
