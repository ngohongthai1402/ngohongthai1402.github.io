<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:#000;
  color:#fff;
}

/* ===== HEADER ===== */
.header{
  padding:20px;
}

.title{
  font-size:26px;
  font-weight:700;
}

.sub{
  font-size:13px;
  color:#aaa;
  margin-top:5px;
}

/* ===== BANNER ===== */
.banner{
  margin:15px;
  height:160px;
  border-radius:20px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  display:flex;
  align-items:flex-end;
  padding:15px;
  font-weight:600;
}

/* ===== SECTION ===== */
.section{
  padding:10px 15px;
  font-size:18px;
  font-weight:600;
}

/* ===== APP CARD ===== */
.app{
  display:flex;
  align-items:center;
  padding:12px 15px;
  border-bottom:1px solid #111;
}

/* ICON */
.icon{
  width:60px;
  height:60px;
  border-radius:16px;
  background:#222;
  margin-right:12px;
}

/* INFO */
.info{
  flex:1;
}

.name{
  font-size:16px;
  font-weight:600;
}

.desc{
  font-size:12px;
  color:#aaa;
  margin-top:3px;
}

/* BUTTON */
.get{
  background:#fff;
  color:#000;
  padding:6px 14px;
  border-radius:20px;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
}

/* ===== VIDEO ===== */
.video-box{
  margin:15px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

video{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* control */
.controls{
  position:absolute;
  bottom:10px;
  right:10px;
  display:flex;
  gap:8px;
}

.controls div{
  width:40px;
  height:40px;
  background:rgba(0,0,0,0.6);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ===== COPY ===== */
.copy{
  margin:15px;
  background:#111;
  padding:15px;
  border-radius:15px;
}

.copy-btn{
  margin-top:10px;
  background:#00c853;
  padding:10px;
  text-align:center;
  border-radius:10px;
}

/* ===== LOADING ===== */
.loading{
  text-align:center;
  color:#0ff;
  display:none;
}
.loading.show{display:block;}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <div onclick="toggleSound()" id="sound">🔇</div>

<!-- APP LIST -->

<div class="app">

</div>

<div class="app">
  <div class="icon"></div>

</div>

<div id="loading" class="loading">📥 Đang mở link...</div>

<!-- COPY -->
<div class="copy">
  https://ngohongthai1402.github.io/download
  <div class="copy-btn" onclick="copyLink()">📋 Sao chép</div>
</div>

<script>

/* INSTALL */
function install(url){
  const loading = document.getElementById("loading");
  loading.classList.add("show");

  window.open(url,"_blank");

  setTimeout(()=>{
    loading.classList.remove("show");
  },3000);
}

/* VIDEO */
const video = document.getElementById("video");

function togglePlay(){
  if(video.paused){
    video.play();
    play.innerText="⏸";
  }else{
    video.pause();
    play.innerText="▶️";
  }
}

function toggleSound(){
  video.muted=!video.muted;
  sound.innerText=video.muted?"🔇":"🔊";
}

/* COPY */
function copyLink(){
  navigator.clipboard.writeText("https://ngohongthai1402.github.io/download");
  alert("Đã sao chép!");
}

</script>
