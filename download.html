<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I AM NHT</title>

<style>

/* ===== BANNER ===== */
.banner{
  width:100%;
  height:38px;
  overflow:hidden;
  display:flex;
  align-items:center;
  background:transparent;
}

.track{
  display:flex;
  width:max-content;
  animation:scroll 35s linear infinite;
}

.item{
  font-size:13px;
  font-weight:700;
  padding:0 25px;
  white-space:nowrap;

  background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:rainbow 6s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

@keyframes rainbow{
  0%{background-position:0%}
  100%{background-position:400%}
}

/* ===== BODY ===== */
body{
  margin:0;
  font-family:system-ui;
  background:transparent;
  color:#fff;
}

/* ===== HEADER ===== */
.header{
  padding:14px;
  text-align:center;
}

/* LOGO */
.logo{
  width:100px;
  height:100px;
  border-radius:60%;
  object-fit:cover;
  border:3px solid #00ffcc;
  margin-bottom:9px;
}

/* NAME */
.top-name{
  font-size:20px;
  font-weight:500;
  color:#00ffcc;

  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
}

/* TÍCH */
.fb-verify-big{
  width:18px;
  height:18px;
}

/* ===== NGÀY GIỜ ĐẸP ===== */
#info{
  font-size:18px;
  margin-top:8px;
  font-weight:800;

  background:linear-gradient(90deg,#00ffcc,#00ffff,#66ff66,#00ffcc);
  background-size:200%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:0 0 6px rgba(0,255,200,0.4);

  animation:timeColor 4s linear infinite;
}

@keyframes timeColor{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* ===== MENU ===== */
.glass{
  margin:10px;
  padding:14px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
}

.title-line{
  font-weight:900;
}

.NHT-live{
  font-size:12px;
  color:#00ffcc;
}

.btn{
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-weight:800;
  background:rgba(0,255,204,0.12);
  border:1px solid rgba(0,255,204,0.35);
  color:#00ffcc;
  cursor:pointer;
}

/* ===== CHAT ===== */
#chatBox{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:300px;
  background:rgba(20,20,20,0.95);
  backdrop-filter:blur(15px);
  border-radius:18px 18px 0 0;
  display:none;
  flex-direction:column;
  z-index:9999;
}

/* HEADER CHAT */
#chatHeader{
  padding:12px;
  text-align:center;
  position:relative;
}

/* NÚT X */
.ios-close{
  position:absolute;
  right:12px;
  top:8px;
  width:28px;
  height:28px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* CONTENT */
#chatContent{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* MSG */
.msg{
  max-width:70%;
  padding:8px 12px;
  border-radius:14px;
}

.user{
  align-self:flex-end;
  background:#00d2ff;
  color:#000;
}

.bot{
  background:#2a2a2a;
}

/* INPUT */
#chatInput{
  display:flex;
  padding:8px;
}

#chatInput input{
  flex:1;
  padding:8px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:#fff;
}

#chatInput button{
  background:#00d2ff;
  border:none;
  padding:8px;
  border-radius:10px;
}

/* OPEN BTN */
#openChatBtn{
  position:fixed;
  bottom:15px;
  right:15px;
  background:#00d2ff;
  padding:14px;
  border-radius:50%;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <img src="logo.png" class="logo">

  <div class="top-name">
    Ngô Hồng Thái
    <svg viewBox="0 0 24 24" class="fb-verify-big">
      <circle cx="12" cy="12" r="12" fill="#1877F2"/>
      <path d="M7 12.5l3 3 7-7" stroke="#fff" stroke-width="2" fill="none"/>
    </svg>
  </div>

  <div id="info">
</div>
  <div class="track">
	<div class="banner">
		</div>
      </div>
    <div class="item">🔥 Chào mừng bạn đến với trang tải speed coin master
    <div class="item">💎 Mua chứng chỉ liên hệ ZALO: 0349 3333 97
</div>
      </div>
  
<!-- MENU -->
<div class="glass">
  <div class="title-line">SPEED IGG <span class="NHT-live">update: 3.5.2510</span></div>
  <div class="btn" onclick="copy(linkIGG)">📋 COPY LINK</div>
  <div class="btn" onclick="download(linkIGG)">📥 DOWNLOAD</div>
</div>

<div class="glass">
  <div class="title-line">SPEED ĐẾM VÒNG <span class="NHT-live">update: 3.5.2510</span></div>
  <div class="btn" onclick="copy(linkDV1)">📋 COPY LINK</div>
  <div class="btn" onclick="download(linkDV1)">📥 DOWNLOAD</div>
</div>

<div class="glass">
  <div class="title-line">SPEED ĐẾM VÒNG V2 <span class="NHT-live">update: 3.5.2510</span></div>
  <div class="btn" onclick="copy(linkDV2)">📋 COPY LINK</div>
  <div class="btn" onclick="download(linkDV2)">📥 DOWNLOAD</div>
</div>

<!-- CHAT -->
<div id="chatBox">
  <div id="chatHeader">
    💬 CHAT
    <span class="ios-close" onclick="closeChat()">✖</span>
  </div>

  <div id="chatContent"></div>

  <div id="chatInput">
    <input id="msg" placeholder="Nhắn..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">➤</button>
  </div>
</div>

<div id="openChatBtn" onclick="openChat()">💬</div>

<script>

/* LINK */
const linkIGG="https://your-link-igg.ipa";
const linkDV1="https://your-link-dv1.ipa";

/* TIME */
setInterval(()=>{
  const n=new Date();
  const days=["CN","T2","T3","T4","T5","T6","T7"];

  document.getElementById("info").innerText =
    days[n.getDay()]+" • "+
    n.toLocaleDateString("vi-VN")+" • "+
    n.toLocaleTimeString("vi-VN");
},1000);

/* CHAT */
function send(){
  const m=document.getElementById("msg");
  if(!m.value) return;

  const div=document.createElement("div");
  div.className="msg user";
  div.innerText=m.value;

  chatContent.appendChild(div);
  m.value="";
}

function openChat(){
  chatBox.style.display="flex";
  openChatBtn.style.display="none";
}

function closeChat(){
  chatBox.style.display="none";
  openChatBtn.style.display="block";
}

/* COPY */
function copy(t){
  navigator.clipboard.writeText(t);
  alert("Đã copy!");
}

/* DOWNLOAD */
function download(u){
  window.open(u);
}

</script>

</body>
</html>
